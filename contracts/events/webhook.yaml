domain: webhook
events:
  webhook.inbound.received:
    version: 1
    category: operational
    partition: webhook_endpoint
    payload_ref: "payloads/webhook_inbound.yaml#WebhookInboundBody"
    producers: [WebhookIngress]
    consumers: [Projector, TransportHub]
    transports: [ws, sse, http_pull]
    audit_required: true
    audit_summary: "webhook inbound received for endpoint {{payload.endpoint_id}}"
    doc: "Signed inbound webhook accepted."
  webhook.outbound.queued:
    version: 1
    category: operational
    partition: webhook_endpoint
    payload_ref: WebhookOutboundQueuedPayload
    producers: [WebhookSender]
    consumers: [Projector, TransportHub]
    transports: [ws, sse, http_pull]
    audit_required: false
    doc: "Outbound delivery queued."
  webhook.outbound.scheduled:
    version: 1
    category: operational
    partition: webhook_endpoint
    payload_ref: WebhookOutboundScheduledPayload
    producers: [WebhookSender]
    consumers: [Projector, TransportHub]
    transports: [ws, sse, http_pull]
    audit_required: false
    doc: "Outbound delivery scheduled with backoff."
  webhook.outbound.sent:
    version: 1
    category: operational
    partition: webhook_endpoint
    payload_ref: WebhookOutboundSentPayload
    producers: [WebhookSender]
    consumers: [Projector, TransportHub]
    transports: [ws, sse, http_pull]
    audit_required: false
    doc: "Outbound HTTP request succeeded."
  webhook.outbound.attempt_failed:
    version: 1
    category: operational
    partition: webhook_endpoint
    payload_ref: WebhookOutboundAttemptFailedPayload
    producers: [WebhookSender]
    consumers: [Projector, TransportHub]
    transports: [ws, sse, http_pull]
    audit_required: false
    doc: "Single delivery attempt failed; will retry."
  webhook.outbound.exhausted:
    version: 1
    category: audit
    partition: webhook_endpoint
    payload_ref: WebhookOutboundExhaustedPayload
    producers: [WebhookSender]
    consumers: [Projector, TransportHub]
    transports: [ws, sse, http_pull]
    audit_required: true
    audit_summary: "webhook outbound exhausted for endpoint {{payload.endpoint_id}}"
    doc: "All retries exhausted; requires audit trail."

payloads:
  WebhookOutboundQueuedPayload:
    endpoint_id: { type: string, required: true }
    delivery_id: { type: string, required: true }
    url: { type: string, required: true }
    method: { type: string, required: true }
    headers: { type: map, value_type: string, required: false }
    body: { type: string, required: false }
    max_attempts: { type: int32, required: false }
    initial_backoff_ms: { type: int32, required: false }
    source_event_seq: { type: int64, required: false }
  WebhookOutboundScheduledPayload:
    endpoint_id: { type: string, required: true }
    delivery_id: { type: string, required: true }
    attempt: { type: int32, required: true }
    not_before: { type: timestamp, required: true }
    reason: { type: string, required: false }
  WebhookOutboundSentPayload:
    endpoint_id: { type: string, required: true }
    delivery_id: { type: string, required: true }
    attempt: { type: int32, required: true }
    status_code: { type: int32, required: true }
    response_body: { type: string, required: false }
    duration_ms: { type: int64, required: true }
  WebhookOutboundAttemptFailedPayload:
    endpoint_id: { type: string, required: true }
    delivery_id: { type: string, required: true }
    attempt: { type: int32, required: true }
    error_class: { type: string, required: true }
    error_message: { type: string, required: true }
    status_code: { type: int32, required: false }
    duration_ms: { type: int64, required: false }
  WebhookOutboundExhaustedPayload:
    endpoint_id: { type: string, required: true }
    delivery_id: { type: string, required: true }
    total_attempts: { type: int32, required: true }
    final_error: { type: string, required: true }
