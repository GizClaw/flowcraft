domain: audit
events:
  audit.action.performed:
    version: 1
    category: audit
    partition: actor
    payload_ref: AuditActionPerformedPayload
    producers: [AuditService]
    consumers: [Projector]
    transports: []
    audit_required: true
    audit_summary: "audit action performed by {{payload.actor_id}}"
    doc: "Explicit audit trail entry."
  audit.action.failed:
    version: 1
    category: audit
    partition: actor
    payload_ref: AuditActionFailedPayload
    producers: [AuditService]
    consumers: [Projector]
    transports: []
    audit_required: true
    audit_summary: "audit action failed for {{payload.actor_id}}"
    doc: "Audit append or validation failed."

payloads:
  AuditActionPerformedPayload:
    actor_id: { type: string, required: true }
    action: { type: string, required: true }
    target_type: { type: string, required: false }
    target_id: { type: string, required: false }
    ip_address: { type: string, required: false }
    user_agent: { type: string, required: false }
    occurred_at: { type: timestamp, required: true }
    details: { type: map, value_type: any, required: false }
  AuditActionFailedPayload:
    actor_id: { type: string, required: true }
    action: { type: string, required: true }
    error_class: { type: string, required: true }
    error_message: { type: string, required: true }
    occurred_at: { type: timestamp, required: true }
    ip_address: { type: string, required: false }
    user_agent: { type: string, required: false }
