domain: agent
events:
  agent.run.started:
    version: 1
    category: business
    partition: card
    payload_ref: AgentRunStartedPayload
    producers: [AgentRuntime]
    consumers: [Projector, TransportHub]
    transports: [ws, sse, http_pull]
    audit_required: false
    doc: "Agent execution started for a card."
  agent.run.completed:
    version: 1
    category: business
    partition: card
    payload_ref: AgentRunCompletedPayload
    producers: [AgentRuntime]
    consumers: [Projector, TransportHub]
    transports: [ws, sse, http_pull]
    audit_required: true
    audit_summary: "agent run completed for card {{payload.card_id}}"
    doc: "Agent execution completed successfully."
  agent.run.failed:
    version: 1
    category: business
    partition: card
    payload_ref: AgentRunFailedPayload
    producers: [AgentRuntime]
    consumers: [Projector, TransportHub]
    transports: [ws, sse, http_pull]
    audit_required: true
    audit_summary: "agent run failed for card {{payload.card_id}}"
    doc: "Agent execution failed."
  agent.stream.delta:
    version: 1
    category: volatile
    partition: card
    payload_ref: AgentStreamDeltaPayload
    producers: [AgentRuntime]
    consumers: [Projector, TransportHub]
    transports: [ws, sse, http_pull]
    audit_required: false
    doc: "Streaming token delta for assistant output."
  agent.thinking.delta:
    version: 1
    category: volatile
    partition: card
    payload_ref: AgentThinkingDeltaPayload
    producers: [AgentRuntime]
    consumers: [Projector, TransportHub]
    transports: [ws, sse, http_pull]
    audit_required: false
    doc: "Streaming delta for model thinking trace."
  agent.tool.invoked:
    version: 1
    category: business
    partition: card
    payload_ref: AgentToolInvokedPayload
    producers: [AgentRuntime]
    consumers: [Projector, TransportHub]
    transports: [ws, sse, http_pull]
    audit_required: false
    doc: "Tool call started."
  agent.tool.returned:
    version: 1
    category: business
    partition: card
    payload_ref: AgentToolReturnedPayload
    producers: [AgentRuntime]
    consumers: [Projector, TransportHub]
    transports: [ws, sse, http_pull]
    audit_required: false
    doc: "Tool call finished."
  agent.config.changed:
    version: 1
    category: business
    partition: runtime
    payload_ref: AgentConfigChangedPayload
    producers: [APIServer]
    consumers: [Projector, TransportHub]
    transports: [ws, sse, http_pull]
    audit_required: true
    audit_summary: "agent {{payload.agent_id}} config changed"
    doc: "Agent configuration (graph / strategy / metadata) was modified."

payloads:
  AgentRunStartedPayload:
    card_id: { type: string, required: true }
    run_id: { type: string, required: true }
  AgentRunCompletedPayload:
    card_id: { type: string, required: true }
    run_id: { type: string, required: true }
    output: { type: string, required: false }
  AgentRunFailedPayload:
    card_id: { type: string, required: true }
    run_id: { type: string, required: true }
    error: { type: string, required: true }
  AgentStreamDeltaPayload:
    card_id: { type: string, required: true }
    run_id: { type: string, required: true }
    delta_seq: { type: int64, required: true }
    delta: { type: string, required: true }
    role: { type: string, required: false }
    finished: { type: bool, required: false }
    conversation_id: { type: string, required: false }
  AgentThinkingDeltaPayload:
    card_id: { type: string, required: true }
    run_id: { type: string, required: true }
    delta_seq: { type: int64, required: true }
    delta: { type: string, required: true }
    finished: { type: bool, required: false }
  AgentToolInvokedPayload:
    card_id: { type: string, required: true }
    run_id: { type: string, required: true }
    tool_name: { type: string, required: true }
    call_id: { type: string, required: true }
    arguments: { type: string, required: false }
  AgentToolReturnedPayload:
    card_id: { type: string, required: true }
    run_id: { type: string, required: true }
    tool_name: { type: string, required: true }
    call_id: { type: string, required: true }
    status: { type: string, required: true }
    output: { type: string, required: false }
    error: { type: string, required: false }
    duration_ms: { type: int64, required: false }
  AgentConfigChangedPayload:
    agent_id: { type: string, required: true }
    runtime_id: { type: string, required: true }
    change: { type: string, required: true }
    revision: { type: int64, required: false }
