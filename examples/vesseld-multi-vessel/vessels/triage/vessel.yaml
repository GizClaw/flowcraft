apiVersion: vessel.flowcraft.io/v1alpha1
kind: Vessel
metadata:
  name: triage
spec:
  agents:
    - triage-dispatcher
    - triage-worker
  # Kanban turns the dispatcher → worker hand-off into a real
  # producer/consumer flow. The dispatcher uses the auto-injected
  # kanban_submit tool to delegate; the worker picks up the card
  # and replies through the same conversation history.
  kanban:
    maxPendingTasks: 64
    maxProducerChain: 3
  resources:
    maxConcurrentRuns: 8
    turnTimeout: 30s
  # Auto-restart on probe failure with exponential backoff. Once
  # MaxRestarts is hit (counter is per stable-window), the captain
  # finalises into PhaseStopped instead of looping forever.
  restart:
    mode: on_failure
    maxRestarts: 3
    backoffInit: 1s
    backoffMax: 30s
---
apiVersion: vessel.flowcraft.io/v1alpha1
kind: Agent
metadata:
  name: triage-dispatcher
spec:
  card:
    name: Triage Dispatcher
    description: Routes incoming requests to the right specialist worker.
    skills:
      - triage
      - routing
  historyAccess: read_write
  dispatcher: true
  producerChain: 3
  engine:
    ref: graph-llm
    config:
      llmProfile: shared-openai
      systemPrompt: |
        You are a triage dispatcher. When the user reports an issue, decide
        which specialist should handle it and call kanban_submit to delegate.
        Otherwise reply directly.
      maxIterations: 8
---
apiVersion: vessel.flowcraft.io/v1alpha1
kind: Agent
metadata:
  name: triage-worker
spec:
  card:
    name: Triage Worker
    description: Handles routed triage tasks.
  historyAccess: read_only
  engine:
    ref: graph-llm
    config:
      llmProfile: shared-openai
      systemPrompt: |
        You execute one triage task delegated by the dispatcher. Reply with
        a concrete next-action recommendation in 2-3 sentences.
