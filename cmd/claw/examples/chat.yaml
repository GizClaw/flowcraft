apiVersion: claw.flowcraft.io/v1alpha1
kind: WorkspaceConfig
metadata:
  name: chat
spec:
  memory_root: memory
  state_root: state
---
apiVersion: claw.flowcraft.io/v1alpha1
kind: ModelsConfig
metadata:
  name: chat
spec:
  chat: azure-chat
  extractor: azure-chat
  llm:
    azure-chat:
      provider: azure
      model: gpt-4o-mini
      api_key: ${FLOWCRAFT_AZURE_OPENAI_API_KEY}
      base_url: ${FLOWCRAFT_AZURE_OPENAI_BASE_URL}
  embedding:
    openai-small:
      provider: openai
      model: text-embedding-3-small
      api_key: ${OPENAI_API_KEY}
---
apiVersion: claw.flowcraft.io/v1alpha1
kind: MemoryConfig
metadata:
  name: chat
spec:
  enabled: true
  scope:
    runtime_id: claw
    user_id: local
    agent_id: claw
  write:
    save_conversation: true
    mode: sync
    tier: general
  extract:
    enabled: true
    model: azure-chat
    mode: two_pass
    temperature: 0
    schema_name: claw_memory_facts
    system_prompt: Extract durable user memories from the conversation.
  recall:
    enabled: true
    top_k: 5
    graph_enabled: true
    include_retired: false
  retrieval:
    backend: bbh
    bbh:
      search_overfetch: 50
      bleve:
        analyzer: gojieba
      hnsw:
        flush_interval: 60s
  embedding:
    enabled: false
    model: openai-small
---
apiVersion: claw.flowcraft.io/v1alpha1
kind: AgentConfig
metadata:
  name: chat
spec:
  id: claw
  name: Claw
  description: Local FlowCraft assistant.
  max_iterations: 8
  graph:
    name: claw-chat
    entry: answer
    nodes:
      - id: answer
        type: llm
        config:
          model: azure-chat
          system_prompt: You are a concise local FlowCraft assistant.
          track_steps: true
    edges:
      - from: answer
        to: __end__
