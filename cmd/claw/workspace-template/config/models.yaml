chat: azure-chat
extractor: azure-chat

llm:
  azure-chat:
    provider: azure
    model: ${FLOWCRAFT_AZURE_OPENAI_MODEL}
    api_key: ${FLOWCRAFT_AZURE_OPENAI_API_KEY}
    base_url: ${FLOWCRAFT_AZURE_OPENAI_BASE_URL}

embedding:
  openai-small:
    provider: openai
    model: text-embedding-3-small
    api_key: ${OPENAI_API_KEY}
