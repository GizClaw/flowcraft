id: claw
name: Claw
description: Local FlowCraft assistant.
max_iterations: 8

graph:
  name: claw-chat
  entry: answer
  nodes:
    - id: answer
      type: llm
      config:
        model: azure/${FLOWCRAFT_AZURE_OPENAI_MODEL}
        system_prompt: |
          You are a concise local FlowCraft assistant.
        track_steps: true
  edges:
    - from: answer
      to: __end__
