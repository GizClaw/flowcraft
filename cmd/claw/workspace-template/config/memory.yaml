enabled: true

scope:
  runtime_id: claw
  user_id: local
  agent_id: claw

write:
  save_conversation: true
  mode: sync
  tier: general

extract:
  enabled: true
  model: azure-chat
  mode: two_pass
  temperature: 0
  schema_name: claw_memory_facts
  system_prompt: |
    Extract durable user memories from the conversation.

recall:
  enabled: true
  top_k: 5
  graph_enabled: true
  include_retired: false

retrieval:
  backend: bbh
  bbh:
    search_overfetch: 50
    bleve:
      analyzer: gojieba
    hnsw:
      flush_interval: 60s

embedding:
  enabled: false
  model: openai-small
