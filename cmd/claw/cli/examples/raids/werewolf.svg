<svg xmlns="http://www.w3.org/2000/svg" width="1720" height="1080" viewBox="0 0 1720 1080" role="img" aria-labelledby="title desc">
  <title id="title">werewolf DAG and memory layout</title>
  <desc id="desc">Werewolf raid graph nodes and memory layout. Memory uses extract plus BM25 recall; embedding is disabled. The game includes explicit night host nodes.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#344054"/>
    </marker>
    <style>
      .bg { fill: #f7f8fa; }
      .panel { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.4; }
      .node { fill: #ffffff; stroke: #98a2b3; stroke-width: 1.5; }
      .script { fill: #eef4ff; stroke: #4f6fd7; }
      .llm { fill: #fff8e8; stroke: #c98416; }
      .tool { fill: #f3ecff; stroke: #7c3aed; }
      .memory { fill: #eefaf5; stroke: #229469; }
      .state { fill: #eef6ff; stroke: #0b6bcb; }
      .end { fill: #f2f4f7; stroke: #667085; }
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .panel-title { font: 700 16px Arial, sans-serif; fill: #111827; }
      .label { font: 700 12px Arial, sans-serif; fill: #111827; }
      .small { font: 12px Arial, sans-serif; fill: #475569; }
      .tiny { font: 11px Arial, sans-serif; fill: #667085; }
      .edge { fill: none; stroke: #344054; stroke-width: 1.5; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #667085; stroke-width: 1.25; stroke-dasharray: 5 5; marker-end: url(#arrow); }
      .edge-label { font: 11px Arial, sans-serif; fill: #344054; }
    </style>
  </defs>

