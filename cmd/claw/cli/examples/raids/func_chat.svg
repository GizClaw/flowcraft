<svg xmlns="http://www.w3.org/2000/svg" width="1540" height="880" viewBox="0 0 1540 880" role="img" aria-labelledby="title desc">
  <title id="title">func_chat DAG and memory layout</title>
  <desc id="desc">The func_chat raid has a speculative chat branch and a function-routing branch. Memory is disabled and shown separately.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      :root { color-scheme: light; }
      .bg { fill: #f7f8fa; }
      .panel { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.4; rx: 8; }
      .node { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
      .script { fill: #eef4ff; stroke: #4f6fd7; }
      .llm { fill: #fff8e8; stroke: #c98416; }
      .fn { fill: #eefaf5; stroke: #229469; }
      .join { fill: #f8fafc; stroke: #64748b; }
      .memory { fill: #f1f5f9; stroke: #64748b; }
      .end { fill: #f1f3f6; stroke: #667085; }
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .panel-title { font: 700 16px Arial, sans-serif; fill: #111827; }
      .label { font: 700 13px Arial, sans-serif; fill: #111827; }
      .small { font: 12px Arial, sans-serif; fill: #475569; }
      .tiny { font: 11px Arial, sans-serif; fill: #64748b; }
      .edge { fill: none; stroke: #334155; stroke-width: 1.8; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 5 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1540" height="880"/>
  <text class="title" x="40" y="48">func_chat.svg</text>
  <text class="small" x="40" y="72">Function route and buffered chat run in parallel; join_select accepts the function path when a function route wins.</text>

  <rect class="panel" x="48" y="104" width="1128" height="748"/>
  <text class="panel-title" x="76" y="140">agent DAG</text>
  <text class="small" x="76" y="162">Only graph nodes and arcs from func_chat.yaml are shown here.</text>

  <rect class="node script" x="80" y="380" width="130" height="58"/>
  <text class="label" x="126" y="414">start</text>

  <rect class="node script" x="256" y="372" width="150" height="72"/>
  <text class="label" x="292" y="402">state_route</text>
  <text class="tiny" x="286" y="424">active route first</text>

  <rect class="node script" x="456" y="372" width="142" height="72"/>
  <text class="label" x="488" y="402">route_fork</text>
  <text class="tiny" x="486" y="424">parallel split</text>

  <rect class="node llm" x="650" y="172" width="158" height="72"/>
  <text class="label" x="690" y="202">chat_buffer</text>
  <text class="tiny" x="680" y="224">publish false</text>

  <rect class="node script" x="650" y="372" width="158" height="72"/>
  <text class="label" x="690" y="402">route_branch</text>
  <text class="tiny" x="682" y="424">state or format</text>

  <rect class="node llm" x="878" y="286" width="160" height="72"/>
  <text class="label" x="916" y="316">format_intent</text>
  <text class="tiny" x="914" y="338">text format</text>

  <rect class="node script" x="878" y="424" width="160" height="72"/>
  <text class="label" x="914" y="454">extract_formatch</text>
  <text class="tiny" x="904" y="476">sets route state</text>

  <rect class="node script" x="650" y="580" width="176" height="72"/>
  <text class="label" x="674" y="610">prepare_function_context</text>
  <text class="tiny" x="682" y="632">build func channel</text>

  <rect class="node fn" x="884" y="562" width="158" height="52"/>
  <text class="label" x="906" y="594">function_play_music</text>

  <rect class="node fn" x="884" y="630" width="158" height="52"/>
  <text class="label" x="908" y="662">function_read_story</text>

  <rect class="node fn" x="884" y="698" width="188" height="52"/>
  <text class="label" x="902" y="730">function_adjust_device_volume</text>

  <rect class="node fn" x="884" y="766" width="158" height="44"/>
  <text class="label" x="926" y="794">function_stop</text>

  <rect class="node script" x="650" y="720" width="176" height="72"/>
  <text class="label" x="672" y="750">clear_completed_route</text>
  <text class="tiny" x="684" y="772">clear or continue</text>

  <rect class="node join" x="298" y="650" width="150" height="72"/>
  <text class="label" x="330" y="680">join_select</text>
  <text class="tiny" x="324" y="702">select output</text>

  <rect class="node end" x="86" y="650" width="120" height="58"/>
  <text class="label" x="124" y="686">__end__</text>

  <path class="edge" d="M 210 409 L 254 409"/>
  <path class="edge" d="M 406 409 L 454 409"/>
  <path class="edge" d="M 598 392 C 628 330 642 240 648 208"/>
  <path class="edge" d="M 598 420 L 648 420"/>
  <path class="edge" d="M 808 396 C 850 374 862 334 876 322"/>
  <path class="edge" d="M 958 358 L 958 422"/>
  <path class="edge" d="M 1038 460 C 982 548 886 608 828 616"/>
  <path class="edge" d="M 808 430 C 846 512 748 544 738 578"/>
  <path class="edge" d="M 826 616 L 882 588"/>
  <path class="edge" d="M 826 616 L 882 656"/>
  <path class="edge" d="M 826 626 L 882 724"/>
  <path class="edge" d="M 826 630 L 882 788"/>
  <path class="edge" d="M 884 588 C 842 622 828 694 826 744"/>
  <path class="edge" d="M 884 656 C 842 674 828 712 826 748"/>
  <path class="edge" d="M 884 724 L 828 754"/>
  <path class="edge" d="M 884 788 C 850 790 832 774 826 762"/>
  <path class="edge" d="M 650 756 C 564 744 504 706 450 690"/>
  <path class="edge" d="M 650 208 C 540 300 450 554 404 648"/>
  <path class="edge" d="M 298 686 L 208 686"/>

  <rect class="panel" x="1216" y="104" width="286" height="748"/>
  <text class="panel-title" x="1244" y="140">memory layout</text>
  <text class="small" x="1244" y="162">func_chat.yaml explicitly disables memory.</text>

  <rect class="node memory" x="1242" y="310" width="236" height="94"/>
  <text class="label" x="1302" y="346">memory.enabled</text>
  <text class="small" x="1336" y="372">false</text>

  <rect class="node memory" x="1242" y="470" width="236" height="96"/>
  <text class="label" x="1308" y="506">workspace state</text>
  <text class="tiny" x="1264" y="528">runtime route vars only</text>
  <text class="tiny" x="1264" y="546">not semantic memory lanes</text>
</svg>
