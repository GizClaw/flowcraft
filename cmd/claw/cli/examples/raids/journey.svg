<svg xmlns="http://www.w3.org/2000/svg" width="1640" height="940" viewBox="0 0 1640 940" role="img" aria-labelledby="title desc">
  <title id="title">journey DAG and memory layout</title>
  <desc id="desc">The Journey raid has an intent-routing branch, story arc nodes, progress-writing nodes, and a separate memory layout with story progress and supporting context lanes.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      :root { color-scheme: light; }
      .bg { fill: #f7f8fa; }
      .panel { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.4; rx: 8; }
      .node { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
      .script { fill: #eef4ff; stroke: #4f6fd7; }
      .llm { fill: #fff8e8; stroke: #c98416; }
      .control { fill: #fff1f2; stroke: #dc2626; }
      .state { fill: #f7f1ff; stroke: #805ad5; }
      .memory { fill: #eefaf5; stroke: #229469; }
      .store { fill: #f0f9ff; stroke: #0284c7; }
      .end { fill: #f1f3f6; stroke: #667085; }
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .panel-title { font: 700 16px Arial, sans-serif; fill: #111827; }
      .label { font: 700 12px Arial, sans-serif; fill: #111827; }
      .small { font: 12px Arial, sans-serif; fill: #475569; }
      .tiny { font: 10.5px Arial, sans-serif; fill: #64748b; }
      .edge { fill: none; stroke: #334155; stroke-width: 1.7; marker-end: url(#arrow); }
      .soft-edge { fill: none; stroke: #64748b; stroke-width: 1.4; stroke-dasharray: 5 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1640" height="940"/>
  <text class="title" x="40" y="48">journey.svg</text>
  <text class="small" x="40" y="72">Story progress is controlled by workspace state; memory lanes are supporting context and audit mirrors.</text>

