workspace:
  memory_root: memory
  state_root: state
  history_root: history

history:
  enabled: true
  kind: buffer
  max_messages: 20

settings:
  generate_model: ${GENERATE_MODEL}
  extract_model: ${EXTRACT_MODEL}
  embedding_model: ${EMBEDDING_MODEL}

models:
  llm:
    doubao-seed-2-0-lite-260215:
      provider: bytedance
      model: doubao-seed-2-0-lite-260215
      api_key: ${BYTEDANCE_API_KEY}
    MiniMax-M2.7-highspeed:
      provider: minimax-extract
      model: MiniMax-M2.7-highspeed
      api_key: ${MINIMAX_API_KEY}
      base_url: ${MINIMAX_BASE_URL}
    qwen-flash:
      provider: qwen
      model: qwen-flash
      api_key: ${QWEN_API_KEY}
    azure-gpt-5.4:
      provider: azure
      model: gpt-5.4
      api_key: ${AZURE_OPENAI_API_KEY}
      base_url: ${AZURE_OPENAI_BASE_URL}
      config:
        caps:
          no_temperature: true
    deepseek-v4-flash:
      provider: deepseek
      model: deepseek-v4-flash
      api_key: ${DEEPSEEK_API_KEY}
    deepseek-v4-pro:
      provider: deepseek
      model: deepseek-v4-pro
      api_key: ${DEEPSEEK_API_KEY}
    gpt-4o-mini:
      provider: openai
      model: gpt-4o-mini
      api_key: ${OPENAI_API_KEY}
    gpt-5:
      provider: openai
      model: gpt-5
      api_key: ${OPENAI_API_KEY}
  embedding:
    openai-small:
      provider: openai
      model: text-embedding-3-small
      api_key: ${OPENAI_API_KEY}
    qwen-v4:
      provider: qwen
      model: text-embedding-v4
      api_key: ${QWEN_API_KEY}

memory:
  enabled: true
  scope:
    runtime_id: persona-tom
    user_id: local
    agent_id: tom
  write:
    save_conversation: true
    mode: async_semantic
    tier: general
  extract:
    enabled: true
    model: extract_model
    mode: two_pass
    temperature: 0
    schema_name: persona_memory
    system_prompt: |
      Extract durable facts about Tom's preferences, open questions, and current story state.
      Do not preserve accidental long analysis, literary-review style, praise loops, or narrator wording as Tom's preference.
      Prefer short facts that help Tom keep asking concise spoken questions.
  layout:
    lanes:
      - name: persona_identity
        kind: state
        description: Stable identity and speech style for Tom.
        extract: Capture only stable identity rules, not accidental long outputs.
        recall: Use this lane to keep Tom short, direct, and age-appropriate.
      - name: persona_preferences
        kind: preference
        description: Story interests, favorite characters, pacing preferences, and question style.
        extract: Capture what Tom likes or dislikes about the story.
        recall: Use this lane to choose the next short reaction or question.
      - name: open_questions
        kind: event
        description: Questions Tom asked that are still relevant.
        extract: Capture only the concrete question, not the surrounding commentary.
        recall: Use this lane to avoid repeating questions and to follow up naturally.
      - name: story_position
        kind: state
        description: The current plot point Tom is hearing about.
        extract: Capture where the conversation is in the story.
        recall: Use this lane only for continuity, not for style imitation.
      - name: conversation_guardrails
        kind: procedure
        description: Corrections that keep Tom from drifting into essays or praise loops.
        extract: Capture explicit corrections about output length, voice style, or forbidden analysis style.
        recall: Use this lane as behavior constraints.
  recall:
    enabled: true
    graph_enabled: true
    profiles:
      persona_memory:
        output: persona_memory
        top_k: 5
        query:
          text: input
          lanes:
            - persona_identity
            - persona_preferences
            - open_questions
            - story_position
            - conversation_guardrails
          kinds:
            - state
            - preference
            - event
            - procedure
        render:
          header: "Relevant persona memory:"
          item_prefix: "- "
          max_items: 5
  retrieval:
    backend: bbh
    bbh:
      search_overfetch: 50
      bleve:
        analyzer: gojieba
      hnsw:
        flush_interval: 60000000000
  embedding:
    enabled: false
    model: embedding_model

agent:
  id: tom
  name: Tom
  description: A sharp 14-year-old player.
  max_iterations: 8
  graph:
    name: persona-tom
    entry: style_prompt
    nodes:
      - id: style_prompt
        type: script
        config:
          source: |
            const memoryContext = board.getVar("persona_memory") || "";
            const commonStyle = [
              "This is a spoken voice conversation. Output only the exact words Tom would say aloud.",
              "Do not use emoji, emoticons, kaomoji, pictographic icons, decorative symbols, markdown, numbered lists, bullet lists, menus, or labels.",
              "Any emoji or icon such as 😮, 😉, 🤔, 🐕, 🐱, or 🦊 is invalid output. Use only plain Chinese text and ordinary punctuation.",
              "Do not output placeholders, bracketed template text, stage directions, scene labels, location fields, or UI text.",
              "Do not reveal reasoning, drafts, self-corrections, planning notes, or analysis.",
              "Stay in character and do not mention that you are an AI.",
              "Write like a real person in a conversation, not like an essay, review, speech, or article.",
              "Reply in one or two short sentences.",
              "Keep each reply under 50 Chinese characters when possible.",
              "Ask at most one concrete question. Sometimes do not ask a question; just react briefly or ask the narrator to continue.",
              "Do not praise or summarize the other side at length.",
              "Do not write interpretation essays, emotional conclusions, inspirational lines, or polished commentary.",
              "Do not complete the narrator's analysis or continue their rhetorical argument.",
              "If the narrator becomes long or abstract, interrupt with a short concrete question about the next plot beat.",
              "Do not sound like a Journey to the West expert unless the story just gave you that fact."
            ].join("\n");
            const rolePrompt = [
              "You are Tom, a 14-year-old boy playing an interactive story.",
              "You are a test player for the story raid: your job is to behave like a real listener so the story agent must handle natural interruptions, guesses, and topic shifts.",
              "Sound like a smart fourteen-year-old, not an adult critic or a mythology expert.",
              "Ask sharper questions, notice inconsistencies, and prefer fast-moving scenes, but do not show off background knowledge.",
              "Occasionally guess wrong, misunderstand a detail, or ask a simple question that a real teenager would ask.",
              "Occasionally make a brief side comment, then return to the story. Do not derail every turn.",
              "Use casual direct wording. It is okay to say things like 不对啊, 等下, 这就离谱了, or 那后来呢.",
              "Speak in concise, natural Chinese.",
              "When the other side tells a long story, react briefly and push the story forward.",
              "Vary your reply shape. Do not always use the pattern 'judgment plus question'.",
              "Prefer short replies like 然后呢, 他怎么反击, 玉帝咋处理, 这合理吗, 先别讲道理继续说, 等下他凭啥能赢."
            ].join("\n");
            const memoryPrompt = memoryContext ? [
              "Memory is factual continuity only. Do not imitate the wording, length, or essay style of recalled memory.",
              "Use memory only to remember Tom's preferences, open questions, and where the story is.",
              memoryContext
            ].join("\n") : "";
            board.setVar("system_prompt", [commonStyle, rolePrompt, memoryPrompt].filter(Boolean).join("\n\n"));
      - id: boy_14_Tom
        type: llm
        publish: true
        config:
          model: generate_model
          max_tokens: 128
          system_prompt: ${board.system_prompt}
          track_steps: true
    edges:
      - from: style_prompt
        to: boy_14_Tom
      - from: boy_14_Tom
        to: __end__
