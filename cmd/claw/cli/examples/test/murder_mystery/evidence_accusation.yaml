raid: murder_mystery
turns:
  - 开始游戏
  - 我去书房检查门锁和门缝
  - 我检查留声机，看它是不是能循环播放
  - 我去壁炉附近找找有没有藏钥匙的地方
  - 我去后廊看有没有脚印或者雨水痕迹
  - 我指认沈知秋。她用备用钥匙进出书房，用细线伪造门从里面锁住，又用留声机循环声音扰乱死亡时间，雨夜后廊的湿痕说明她绕路回来，动机应该和遗嘱或旧仇有关
