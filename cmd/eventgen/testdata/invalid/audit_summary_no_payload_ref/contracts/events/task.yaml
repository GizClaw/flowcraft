domain: task
events:
  task.submitted:
    version: 1
    category: audit
    partition: card
    payload_ref: P
    producers: [test]
    consumers: [test]
    transports: [ws]
    audit_required: true
    audit_summary: "task submitted"
    doc: "audit_summary missing {{payload.*}} reference"
payloads:
  P:
    card_id: { type: string, required: true }
