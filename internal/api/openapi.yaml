  # ── WebSocket ──
  /ws-ticket:
    post:
      operationId: createWSTicket
      tags: [websocket]
      responses:
        "200":
          description: WebSocket ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WSTicketResponse"
        default:
          $ref: "#/components/responses/Error"

  # ── Health ──
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        default:
          $ref: "#/components/responses/Error"

# ---------- components ----------
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: flowcraft_token
      description: JWT issued by `/auth/login`, set as HttpOnly cookie.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Same JWT as cookieAuth, sent via the Authorization: Bearer header."

  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    AgentID:
      name: id
      in: path
      required: true
      schema:
        type: string
    RunID:
      name: id
      in: path
      required: true
      schema:
        type: string
    DatasetID:
      name: id
      in: path
      required: true
      schema:
        type: string
    SkillName:
      name: name
      in: path
      required: true
      schema:
        type: string
    PluginName:
      name: name
      in: path
      required: true
      schema:
        type: string

  responses:
    Error:
      description: Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ── Error ──
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message]
          properties:
            message:
              type: string
            code:
              type: string
              description: Machine-readable error code (platform + errdefs mapping).

    # ── Pagination ──
    PaginationResult:
      type: object
      properties:
        has_more:
          type: boolean
        next_cursor:
          type: string

    # ── Auth ──
    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    AuthStatus:
      type: object
      required: [initialized, auth_mode]
      properties:
        initialized:
          type: boolean
          description: True iff owner credentials have been set via `/auth/setup`.
        auth_mode:
          type: string
          description: Always `"jwt"` in the current implementation.

    SetupRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      required: [token, expires_at]
      properties:
        token:
          type: string
          description: JWT (also set as HttpOnly cookie).
        expires_at:
          type: string
          format: date-time

    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
        new_password:
          type: string
          minLength: 8

    SessionInfo:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean
        username:
          type: string
          description: Present iff `authenticated == true`.

    # ── Agent ──
    # Free-form bag with dynamic key/value structure (untyped JSON object).
    JSONObject:
      type: object
      additionalProperties: true

    Agent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        description:
          type: string
        config:
          $ref: "#/components/schemas/JSONObject"
        graph_definition:
          $ref: "#/components/schemas/JSONObject"
        input_schema:
          $ref: "#/components/schemas/JSONObject"
        output_schema:
          $ref: "#/components/schemas/JSONObject"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentList:
      allOf:
        - $ref: "#/components/schemas/PaginationResult"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Agent"

    CreateAgentRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        description:
          type: string
        config:
          $ref: "#/components/schemas/JSONObject"
        graph_definition:
          $ref: "#/components/schemas/JSONObject"
        input_schema:
          $ref: "#/components/schemas/JSONObject"
        template:
          type: string
      required: [name]

    UpdateAgentRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        config:
          $ref: "#/components/schemas/JSONObject"
        graph_definition:
          $ref: "#/components/schemas/JSONObject"
        input_schema:
          $ref: "#/components/schemas/JSONObject"

    # ── Chat ──
    ChatRequest:
      type: object
      required: [agent_id, query]
      properties:
        agent_id:
          type: string
        conversation_id:
          type: string
        query:
          type: string
        inputs:
          $ref: "#/components/schemas/JSONObject"
        async:
          type: boolean

    ResumeRequest:
      type: object
      required: [agent_id, conversation_id, run_id, decision]
      properties:
        agent_id:
          type: string
        conversation_id:
          type: string
        run_id:
          type: string
        state:
          $ref: "#/components/schemas/JSONObject"
        decision:
          $ref: "#/components/schemas/JSONObject"

    # ── WebSocket ──
    WSTicketResponse:
      type: object
      required: [ticket, expires_at]
      properties:
        ticket:
          type: string
        expires_at:
          type: string
          format: date-time

    # ── Conversation ──
    Conversation:
      type: object
      properties:
        id:
          type: string
        agent_id:
          type: string
        runtime_id:
          type: string
        variables:
          $ref: "#/components/schemas/JSONObject"
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ConversationList:
      allOf:
        - $ref: "#/components/schemas/PaginationResult"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Conversation"

    Message:
      type: object
      properties:
        id:
          type: string
        conversation_id:
          type: string
        role:
          type: string
        content:
          type: string
        metadata:
          $ref: "#/components/schemas/JSONObject"
        token_count:
          type: integer
        created_at:
          type: string
          format: date-time

    MessageList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Message"

    # ── Workflow Run ──
    WorkflowRun:
      type: object
      properties:
        id:
          type: string
        agent_id:
          type: string
        actor_id:
          type: string
        conversation_id:
          type: string
        input:
          type: string
        output:
          type: string
        inputs:
          $ref: "#/components/schemas/JSONObject"
        outputs:
          $ref: "#/components/schemas/JSONObject"
        status:
          type: string
        usage:
          $ref: "#/components/schemas/JSONObject"
        elapsed_ms:
          type: integer
        created_at:
          type: string
          format: date-time

    WorkflowRunList:
      allOf:
        - $ref: "#/components/schemas/PaginationResult"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/WorkflowRun"

    ExecutionEvent:
      type: object
      properties:
        id:
          type: string
        run_id:
          type: string
        node_id:
          type: string
        type:
          type: string
        payload:
          $ref: "#/components/schemas/JSONObject"
        created_at:
          type: string
          format: date-time

    ExecutionEventList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ExecutionEvent"

    # ── Knowledge ──
    Dataset:
      type: object
      properties:
        id:
          type: string
        agent_id:
          type: string
        name:
          type: string
        description:
          type: string
        document_count:
          type: integer
        l0_abstract:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DatasetList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Dataset"

    CreateDatasetRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        agent_id:
          type: string
      required: [name]

    DatasetDocument:
      type: object
      properties:
        id:
          type: string
        dataset_id:
          type: string
        name:
          type: string
        content:
          type: string
        chunk_count:
          type: integer
        l0_abstract:
          type: string
        l1_overview:
          type: string
        processing_status:
          type: string
        created_at:
          type: string
          format: date-time

    DocumentList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DatasetDocument"

    AddDocumentRequest:
      type: object
      properties:
        name:
          type: string
        content:
          type: string
      required: [name, content]

    DatasetQueryRequest:
      type: object
      properties:
        query:
          type: string
        top_k:
          type: integer
        max_layer:
          type: integer
        threshold:
          type: number
      required: [query]

    QueryResult:
      type: object
      properties:
        document_id:
          type: string
        document_name:
          type: string
        content:
          type: string
        score:
          type: number
        layer:
          type: string
          description: Context layer tag ("L0", "L1", "L2")
          enum: ["L0", "L1", "L2"]
        chunk_index:
          type: integer

    QueryResultList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/QueryResult"

    # ── Graph Version ──
    GraphVersion:
      type: object
      properties:
        id:
          type: string
        agent_id:
          type: string
        version:
          type: integer
        graph_definition:
          $ref: "#/components/schemas/JSONObject"
        description:
          type: string
        checksum:
          type: string
        created_by:
          type: string
        published_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    GraphVersionList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/GraphVersion"

    PublishVersionRequest:
      type: object
      properties:
        description:
          type: string

    VersionDiff:
      type: object
      properties:
        v1:
          type: integer
        v2:
          type: integer
        added_nodes:
          type: array
          items:
            type: string
        removed_nodes:
          type: array
          items:
            type: string
        modified_nodes:
          type: array
          items:
            type: string
        added_edges:
          type: array
          items:
            type: string
        removed_edges:
          type: array
          items:
            type: string

    GraphOperation:
      type: object
      properties:
        id:
          type: string
        agent_id:
          type: string
        type:
          type: string
        node_id:
          type: string
        edge_from:
          type: string
        edge_to:
          type: string
        graph_def:
          $ref: "#/components/schemas/JSONObject"
        description:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time

    GraphOperationList:
      allOf:
        - $ref: "#/components/schemas/PaginationResult"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/GraphOperation"

    # ── Compile ──
    CompileResult:
      type: object
      properties:
        success:
          type: boolean
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/CompileIssue"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/CompileIssue"
        metadata:
          $ref: "#/components/schemas/JSONObject"

    CompileIssue:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        node_ids:
          type: array
          items:
            type: string

    DryRunResult:
      type: object
      properties:
        valid:
          type: boolean
        node_results:
          type: array
          items:
            $ref: "#/components/schemas/NodeValidationResult"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/CompileIssue"

    NodeValidationResult:
      type: object
      properties:
        node_id:
          type: string
        node_type:
          type: string
        valid:
          type: boolean
        warnings:
          type: array
          items:
            type: string

    # ── Import/Export ──
    ImportRequest:
      type: object
      properties:
        format:
          type: string
        content:
          type: string
        force:
          type: boolean
      required: [format, content]

    ImportResult:
      type: object
      properties:
        success:
          type: boolean
        compile_result:
          $ref: "#/components/schemas/CompileResult"

    # ── Memory ──
    MemoryEntry:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        category:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MemoryEntryList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MemoryEntry"

    UpdateMemoryRequest:
      type: object
      properties:
        content:
          type: string
      required: [content]

    # ── Node Types ──
    NodeFieldOption:
      type: object
      properties:
        label:
          type: string
        value:
          type: string

    NodeFieldSchema:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        type:
          type: string
        required:
          type: boolean
        placeholder:
          type: string
        options:
          type: array
          items:
            $ref: "#/components/schemas/NodeFieldOption"

    NodeSchema:
      type: object
      properties:
        type:
          type: string
        label:
          type: string
        description:
          type: string
        category:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/NodeFieldSchema"

    NodeTypeList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/NodeSchema"

    # ── Templates ──
    TemplateParameter:
      type: object
      properties:
        name:
          type: string
        label:
          type: string
        type:
          type: string
        default:
          description: Default value (any JSON type).
        required:
          type: boolean
      additionalProperties: true

    GraphTemplate:
      type: object
      properties:
        name:
          type: string
        label:
          type: string
        description:
          type: string
        category:
          type: string
        parameters:
          type: array
          items:
            $ref: "#/components/schemas/TemplateParameter"
        graph_def:
          $ref: "#/components/schemas/JSONObject"

    TemplateList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/GraphTemplate"

    CreateTemplateRequest:
      type: object
      properties:
        name:
          type: string
        label:
          type: string
        description:
          type: string
        category:
          type: string
        parameters:
          type: array
          items:
            $ref: "#/components/schemas/TemplateParameter"
        graph_def:
          $ref: "#/components/schemas/JSONObject"
      required: [name, label, description, category, graph_def]

    TemplateParams:
      type: object
      additionalProperties: true

    GraphDefinition:
      type: object
      properties:
        name:
          type: string
        entry:
          type: string
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/JSONObject"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/JSONObject"

    # ── Tools ──
    ToolInfo:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    ToolList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ToolInfo"

    # ── Skills ──
    SkillInfo:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        dir:
          type: string
        entry:
          type: string
        builtin:
          type: boolean
        enabled:
          type: boolean
        source:
          type: string

    SkillList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/SkillInfo"

    InstallSkillRequest:
      type: object
      properties:
        url:
          type: string
        name:
          type: string
      required: [url]

    SkillInstallResult:
      type: object
      properties:
        status:
          type: string
        url:
          type: string
        name:
          type: string

    # ── Models + Providers ──
    ModelInfo:
      type: object
      properties:
        provider:
          type: string
        model:
          type: string
        label:
          type: string
        is_default:
          type: boolean

    ModelList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ModelInfo"

    AddModelRequest:
      type: object
      properties:
        provider:
          type: string
        model:
          type: string
        api_key:
          type: string
        base_url:
          type: string
        extra:
          $ref: "#/components/schemas/JSONObject"
      required: [provider, model]

    SetDefaultModelRequest:
      type: object
      properties:
        provider:
          type: string
        model:
          type: string
      required: [provider, model]

    ProviderInfo:
      type: object
      properties:
        name:
          type: string
        configured:
          type: boolean
        models:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              name:
                type: string

    ProviderList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProviderInfo"

    ConfigureProviderRequest:
      type: object
      properties:
        api_key:
          type: string
        base_url:
          type: string
        extra:
          $ref: "#/components/schemas/JSONObject"
      required: [api_key]

    # ── Plugins ──
    PluginInfo:
      type: object
      required: [id, name, builtin]
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        type:
          type: string
        description:
          type: string
        author:
          type: string
        icon:
          type: string
        homepage:
          type: string
        builtin:
          type: boolean
        created_at:
          type: string
          format: date-time

    PluginDetail:
      type: object
      required: [info, status]
      properties:
        info:
          $ref: "#/components/schemas/PluginInfo"
        status:
          type: string
          enum: [installed, active, inactive, error]
        config:
          $ref: "#/components/schemas/JSONObject"
        error:
          type: string

    PluginList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PluginDetail"

    PluginConfig:
      type: object
      additionalProperties: true

    PluginUploadResult:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        size:
          type: integer
        added:
          type: array
          items:
            type: string
        removed:
          type: array
          items:
            type: string

    # ── Stats ──
    StatsOverview:
      type: object
      properties:
        total_agents:
          type: integer
        total_conversations:
          type: integer
        total_runs:
          type: integer

    DailyRunStats:
      type: object
      properties:
        date:
          type: string
        count:
          type: integer
        avg_elapsed_ms:
          type: number

    DailyRunStatsList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DailyRunStats"

    RuntimeStats:
      type: object
      properties:
        runtime_id:
          type: string
        runtime_count:
          type: integer
        actor_count:
          type: integer
        current:
          $ref: "#/components/schemas/JSONObject"

    MemoryCategoryCount:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer

    MemoryStats:
      type: object
      properties:
        runtime_id:
          type: string
        total_entries:
          type: integer
        categories:
          type: array
          items:
            $ref: "#/components/schemas/MemoryCategoryCount"

    # ── Monitoring ──
    MonitoringSummary:
      type: object
      properties:
        window_start:
          type: string
          format: date-time
        window_end:
          type: string
          format: date-time
        run_total:
          type: integer
        run_success:
          type: integer
        run_failed:
          type: integer
        success_rate:
          type: number
        error_rate:
          type: number
        latency_p50_ms:
          type: number
        latency_p95_ms:
          type: number
        latency_p99_ms:
          type: number
        health:
          type: string
        health_reason:
          type: string

    MonitoringTimeseries:
      type: object
      properties:
        window_start:
          type: string
          format: date-time
        window_end:
          type: string
          format: date-time
        interval:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/JSONObject"

    RuntimeManagerStats:
      type: object
      properties:
        runtime_count:
          type: integer
        actor_count:
          type: integer

    MonitoringDiagnostics:
      type: object
      properties:
        top_failed_agents:
          type: array
          items:
            $ref: "#/components/schemas/JSONObject"
        top_error_codes:
          type: array
          items:
            $ref: "#/components/schemas/JSONObject"
        recent_failures:
          type: array
          items:
            $ref: "#/components/schemas/JSONObject"

    # ── Kanban ──
    KanbanCardList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/JSONObject"

    KanbanTimeline:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/JSONObject"

    KanbanTopology:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/JSONObject"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/JSONObject"

    # ── Channel Types ──
    ChannelTypeList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChannelType"

    ChannelType:
      type: object
      properties:
        type:
          type: string
        label:
          type: string
        config_schema:
          type: object
          additionalProperties: true

    # ── Health ──
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Misc small response schemas (extracted from inline definitions) ──
    AbortResult:
      type: object
      properties:
        aborted:
          type: boolean

    SkillUpdateResult:
      type: object
      properties:
        status:
          type: string
        name:
          type: string

    SkillUpdateAllResult:
      type: object
      properties:
        updated:
          type: array
          items:
            type: string
        error:
          type: string

    PluginReloadResult:
      type: object
      properties:
        added:
          type: array
          items:
            type: string
        removed:
          type: array
          items:
            type: string
