openapi: "3.1.0"
info:
  title: FlowCraft API
  version: "1.0.0"
  description: |
    FlowCraft platform API.

    NOTE: a few HTTP endpoints are intentionally NOT described here because they
    do not fit the OpenAPI request/response model. They are mounted directly in
    `internal/api/server.go`:
      • `GET  /api/ws`                — WebSocket upgrade
      • `POST /api/webhook/{channel}` — channel-specific webhook (dynamic schema)
      • `GET  /healthz`               — root-level alias of `/api/healthz`

    Everything else is generated from this file. Run `make generate` after edits;
    CI verifies that `internal/api/oas/**` and `web/src/api/schema.d.ts` are in
    sync with this spec.

# All endpoints below default to cookie-or-bearer JWT auth. Public endpoints
# explicitly opt out with `security: []`.
security:
  - cookieAuth: []
  - bearerAuth: []

# ---------- paths ----------
paths:
  # ── Auth ──
  # All auth endpoints are public (no cookie/bearer required to reach them).
  /auth/status:
    get:
      operationId: getAuthStatus
      tags: [auth]
      security: []
      description: Returns whether owner credentials have been initialized.
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"
        default:
          $ref: "#/components/responses/Error"

  /auth/setup:
    post:
      operationId: setupAuth
      tags: [auth]
      security: []
      description: One-time owner credential bootstrap. Returns 409 if already initialized.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupRequest"
      responses:
        "200":
          description: Setup completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        default:
          $ref: "#/components/responses/Error"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login result. Sets the `flowcraft_token` HttpOnly cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        default:
          $ref: "#/components/responses/Error"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      security: []
      responses:
        "204":
          description: Logged out. Clears the `flowcraft_token` cookie.
        default:
          $ref: "#/components/responses/Error"

  /auth/session:
    get:
      operationId: getSession
      tags: [auth]
      security: []
      responses:
        "200":
          description: Session info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"
        default:
          $ref: "#/components/responses/Error"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        default:
          $ref: "#/components/responses/Error"

  # ── Agents ──
  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createAgent
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
      responses:
        "201":
          description: Created agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        default:
          $ref: "#/components/responses/Error"

  /agents/{id}:
    get:
      operationId: getAgent
      tags: [agents]
      parameters:
        - $ref: "#/components/parameters/AgentID"
      responses:
        "200":
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        default:
          $ref: "#/components/responses/Error"
    put:
      operationId: updateAgent
      tags: [agents]
      parameters:
        - $ref: "#/components/parameters/AgentID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentRequest"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteAgent
      tags: [agents]
      parameters:
        - $ref: "#/components/parameters/AgentID"
      responses:
        "204":
          description: Deleted
        default:
          $ref: "#/components/responses/Error"

  /agents/{agentID}/abort:
    post:
      operationId: abortActor
      tags: [agents]
      parameters:
        - name: agentID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Abort result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AbortResult"
        default:
          $ref: "#/components/responses/Error"

  # ── Chat (SSE) ──
  /chat/stream:
    post:
      operationId: chatStream
      tags: [chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream: {}
        default:
          $ref: "#/components/responses/Error"

  /chat/resume/stream:
    post:
      operationId: resumeStream
      tags: [chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResumeRequest"
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream: {}
        default:
          $ref: "#/components/responses/Error"

  # ── Conversations ──
  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      parameters:
        - name: agent_id
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Conversation list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationList"
        default:
          $ref: "#/components/responses/Error"

  /conversations/{id}/messages:
    get:
      operationId: getMessages
      tags: [conversations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Message list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageList"
        default:
          $ref: "#/components/responses/Error"

  # ── Workflow Runs ──
  /workflows/runs:
    get:
      operationId: listWorkflowRuns
      tags: [workflows]
      parameters:
        - name: agent_id
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Run list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRunList"
        default:
          $ref: "#/components/responses/Error"

  /workflows/runs/{id}:
    get:
      operationId: getWorkflowRun
      tags: [workflows]
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRun"
        default:
          $ref: "#/components/responses/Error"

  /workflows/runs/{id}/events:
    get:
      operationId: getWorkflowRunEvents
      tags: [workflows]
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Execution events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionEventList"
        default:
          $ref: "#/components/responses/Error"

  /workflows/runs/{id}/status:
    get:
      operationId: getRunStatus
      tags: [workflows]
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Run status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRun"
        default:
          $ref: "#/components/responses/Error"

  # ── Knowledge ──
  /datasets:
    post:
      operationId: createDataset
      tags: [knowledge]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDatasetRequest"
      responses:
        "201":
          description: Created dataset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        default:
          $ref: "#/components/responses/Error"
    get:
      operationId: listDatasets
      tags: [knowledge]
      responses:
        "200":
          description: Dataset list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetList"
        default:
          $ref: "#/components/responses/Error"

  /datasets/{id}:
    get:
      operationId: getDataset
      tags: [knowledge]
      parameters:
        - $ref: "#/components/parameters/DatasetID"
      responses:
        "200":
          description: Dataset detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteDataset
      tags: [knowledge]
      parameters:
        - $ref: "#/components/parameters/DatasetID"
      responses:
        "204":
          description: Deleted
        default:
          $ref: "#/components/responses/Error"

  /datasets/{id}/documents:
    post:
      operationId: addDocument
      tags: [knowledge]
      parameters:
        - $ref: "#/components/parameters/DatasetID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddDocumentRequest"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetDocument"
        default:
          $ref: "#/components/responses/Error"
    get:
      operationId: listDocuments
      tags: [knowledge]
      parameters:
        - $ref: "#/components/parameters/DatasetID"
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentList"
        default:
          $ref: "#/components/responses/Error"

  /datasets/{id}/documents/{docId}:
    delete:
      operationId: deleteDocument
      tags: [knowledge]
      parameters:
        - $ref: "#/components/parameters/DatasetID"
        - name: docId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        default:
          $ref: "#/components/responses/Error"

  /datasets/{id}/query:
    post:
      operationId: queryDocuments
      tags: [knowledge]
      parameters:
        - $ref: "#/components/parameters/DatasetID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetQueryRequest"
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResultList"
        default:
          $ref: "#/components/responses/Error"

  # ── Graph Versions ──
  /agents/{id}/versions:
    get:
      operationId: listVersions
      tags: [versions]
      parameters:
        - $ref: "#/components/parameters/AgentID"
      responses:
        "200":
          description: Version list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphVersionList"
        default:
          $ref: "#/components/responses/Error"

  /agents/{id}/versions/publish:
    post:
      operationId: publishVersion
      tags: [versions]
      parameters:
        - $ref: "#/components/parameters/AgentID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishVersionRequest"
      responses:
        "201":
          description: Published version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphVersion"
        default:
          $ref: "#/components/responses/Error"

  /agents/{id}/versions/{ver}/rollback:
    post:
      operationId: rollbackVersion
      tags: [versions]
      parameters:
        - $ref: "#/components/parameters/AgentID"
        - name: ver
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rolled-back version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphVersion"
        default:
          $ref: "#/components/responses/Error"

  /agents/{id}/versions/diff:
    get:
      operationId: diffVersions
      tags: [versions]
      parameters:
        - $ref: "#/components/parameters/AgentID"
        - name: v1
          in: query
          required: true
          schema:
            type: integer
        - name: v2
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Version diff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionDiff"
        default:
          $ref: "#/components/responses/Error"

  # ── Graph History ──
  /agents/{id}/graph/history:
    get:
      operationId: getGraphHistory
      tags: [versions]
      parameters:
        - $ref: "#/components/parameters/AgentID"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Graph operation history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphOperationList"
        default:
          $ref: "#/components/responses/Error"

  # ── Compile + DryRun ──
  /agents/{id}/compile:
    post:
      operationId: compileGraph
      tags: [compile]
      parameters:
        - $ref: "#/components/parameters/AgentID"
      responses:
        "200":
          description: Compile result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompileResult"
        default:
          $ref: "#/components/responses/Error"

  /agents/{id}/dryrun:
    post:
      operationId: dryRun
      tags: [compile]
      parameters:
        - $ref: "#/components/parameters/AgentID"
      responses:
        "200":
          description: DryRun result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DryRunResult"
        default:
          $ref: "#/components/responses/Error"

  # ── Import/Export ──
  /agents/{id}/export:
    get:
      operationId: exportAgent
      tags: [agents]
      parameters:
        - $ref: "#/components/parameters/AgentID"
        - name: format
          in: query
          schema:
            type: string
            enum: [json, yaml]
            default: json
      responses:
        "200":
          description: Graph definition file download
          headers:
            Content-Disposition:
              required: true
              schema:
                type: string
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          $ref: "#/components/responses/Error"

  /agents/{id}/import:
    post:
      operationId: importAgent
      tags: [agents]
      parameters:
        - $ref: "#/components/parameters/AgentID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportRequest"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        default:
          $ref: "#/components/responses/Error"

  # ── Memory ──
  /memories:
    get:
      operationId: listMemories
      tags: [memory]
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Memory entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntryList"
        default:
          $ref: "#/components/responses/Error"

  /memories/{entryID}:
    put:
      operationId: updateMemory
      tags: [memory]
      parameters:
        - name: entryID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemoryRequest"
      responses:
        "200":
          description: Updated memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryEntry"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteMemory
      tags: [memory]
      parameters:
        - name: entryID
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        default:
          $ref: "#/components/responses/Error"

  # ── Node Types + Templates ──
  /node-types:
    get:
      operationId: listNodeTypes
      tags: [nodes]
      responses:
        "200":
          description: Available node types
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeTypeList"
        default:
          $ref: "#/components/responses/Error"

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      responses:
        "200":
          description: Template list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createTemplate
      tags: [templates]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateRequest"
      responses:
        "201":
          description: Created template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphTemplate"
        default:
          $ref: "#/components/responses/Error"

  /templates/{name}:
    delete:
      operationId: deleteTemplate
      tags: [templates]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        default:
          $ref: "#/components/responses/Error"

  /templates/{name}/instantiate:
    post:
      operationId: instantiateTemplate
      tags: [templates]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateParams"
      responses:
        "200":
          description: Instantiated graph definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphDefinition"
        default:
          $ref: "#/components/responses/Error"

  # ── Tools ──
  /tools:
    get:
      operationId: listTools
      tags: [tools]
      responses:
        "200":
          description: Available tools
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolList"
        default:
          $ref: "#/components/responses/Error"

  # ── Skills ──
  /skills:
    get:
      operationId: listSkills
      tags: [skills]
      responses:
        "200":
          description: Installed skills
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillList"
        default:
          $ref: "#/components/responses/Error"

  /skills/install:
    post:
      operationId: installSkill
      tags: [skills]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstallSkillRequest"
      responses:
        "201":
          description: Installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillInstallResult"
        default:
          $ref: "#/components/responses/Error"

  /skills/{name}:
    put:
      operationId: updateSkill
      tags: [skills]
      parameters:
        - $ref: "#/components/parameters/SkillName"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillUpdateResult"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteSkill
      tags: [skills]
      parameters:
        - $ref: "#/components/parameters/SkillName"
      responses:
        "204":
          description: Deleted
        default:
          $ref: "#/components/responses/Error"

  /skills/update-all:
    post:
      operationId: updateAllSkills
      tags: [skills]
      responses:
        "200":
          description: Update result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillUpdateAllResult"
        default:
          $ref: "#/components/responses/Error"

  # ── Models + Providers ──
  /models:
    get:
      operationId: listModels
      tags: [models]
      responses:
        "200":
          description: Model list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelList"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: addModel
      tags: [models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddModelRequest"
      responses:
        "201":
          description: Added model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelInfo"
        default:
          $ref: "#/components/responses/Error"

  /models/default:
    put:
      operationId: setDefaultModel
      tags: [models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetDefaultModelRequest"
      responses:
        "204":
          description: Default set
        default:
          $ref: "#/components/responses/Error"

  /models/{modelID}:
    delete:
      operationId: deleteModel
      tags: [models]
      parameters:
        - name: modelID
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        default:
          $ref: "#/components/responses/Error"

  /providers:
    get:
      operationId: listProviders
      tags: [models]
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderList"
        default:
          $ref: "#/components/responses/Error"

  /providers/{name}/configure:
    post:
      operationId: configureProvider
      tags: [models]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigureProviderRequest"
      responses:
        "204":
          description: Configured
        default:
          $ref: "#/components/responses/Error"

  # ── Stats ──
  /stats:
    get:
      operationId: getStats
      tags: [stats]
      responses:
        "200":
          description: Overview stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsOverview"
        default:
