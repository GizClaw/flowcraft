syntax = "proto3";

package plugin;

option go_package = "github.com/GizClaw/flowcraft/plugin/proto";

// PluginLifecycle manages the external plugin lifecycle.
service PluginLifecycle {
  rpc Handshake(HandshakeRequest) returns (HandshakeResponse);
  rpc Initialize(InitializeRequest) returns (InitializeResponse);
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// ToolService exposes tool execution from external plugins.
service ToolService {
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);
  rpc Execute(ToolExecuteRequest) returns (ToolExecuteResponse);
}

// NodeService exposes node execution with bidirectional callbacks.
service NodeService {
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  rpc Execute(stream NodeMessage) returns (stream NodeMessage);
}

// --- Lifecycle messages ---

message HandshakeRequest {
  string host_version = 1;
  int32 protocol_version = 2;
}

message HandshakeResponse {
  PluginInfo plugin_info = 1;
  int32 protocol_version = 2;
  repeated ToolSpec tools = 3;
  repeated NodeSpec nodes = 4;
}

message InitializeRequest {
  map<string, string> config = 1;
}

message InitializeResponse {}

message ShutdownRequest {}
message ShutdownResponse {}

message HealthCheckRequest {}
message HealthCheckResponse {
  bool healthy = 1;
}

// --- Tool messages ---

message ListToolsRequest {}

message ListToolsResponse {
  repeated ToolSpec tools = 1;
}

message ToolExecuteRequest {
  string name = 1;
  string arguments = 2;
}

message ToolExecuteResponse {
  string result = 1;
  string error = 2;
}

// --- Node messages ---

message ListNodesRequest {}

message ListNodesResponse {
  repeated NodeSpec nodes = 1;
}

// NodeMessage is the bidirectional streaming message for node execution.
// The host sends ExecuteRequest, the plugin may send callbacks (GetVar,
// SetVar, LLMGenerate, ToolExecute, StreamEmit, SandboxExec, Signal),
// and finally the plugin sends ExecuteResponse.
message NodeMessage {
  oneof msg {
    NodeExecuteRequest execute_request = 1;
    NodeExecuteResponse execute_response = 2;
    GetVarRequest get_var_request = 3;
    GetVarResponse get_var_response = 4;
    SetVarRequest set_var_request = 5;
    LLMGenerateRequest llm_generate_request = 6;
    LLMGenerateResponse llm_generate_response = 7;
    ToolExecuteRequest tool_execute_request = 8;
    ToolExecuteResponse tool_execute_response = 9;
    StreamEmitRequest stream_emit_request = 10;
    SandboxExecRequest sandbox_exec_request = 11;
    SandboxExecResponse sandbox_exec_response = 12;
    SignalRequest signal_request = 13;
    SignalResponse signal_response = 14;
  }
}

message NodeExecuteRequest {
  string node_id = 1;
  map<string, string> config = 2;
}

message NodeExecuteResponse {
  map<string, string> outputs = 1;
  string error = 2;
}

message GetVarRequest {
  string key = 1;
}

message GetVarResponse {
  string value = 1;
  bool found = 2;
}

message SetVarRequest {
  string key = 1;
  string value = 2;
}

message LLMGenerateRequest {
  string prompt = 1;
}

message LLMGenerateResponse {
  string result = 1;
  string error = 2;
}

message StreamEmitRequest {
  string data = 1;
}

message SandboxExecRequest {
  string command = 1;
}

message SandboxExecResponse {
  string output = 1;
  string error = 2;
}

message SignalRequest {
  string signal_type = 1;
  bytes payload = 2;
}

message SignalResponse {
  string error = 1;
}

// --- Shared types ---

message PluginInfo {
  string id = 1;
  string name = 2;
  string version = 3;
  string type = 4;
  string description = 5;
  string author = 6;
  bool builtin = 7;
}

message ToolSpec {
  string name = 1;
  string description = 2;
  string input_schema_json = 3;
}

message NodeSpec {
  string type = 1;
  string schema_json = 2;
}
