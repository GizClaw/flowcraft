apiVersion: vessel.flowcraft.io/v1alpha1
kind: Daemon
metadata:
  name: vesseld-dup
spec:
  control:
    socket: /tmp/dup.sock
---
apiVersion: vessel.flowcraft.io/v1alpha1
kind: Vessel
metadata:
  name: alpha
spec:
  agents: [a1]
---
apiVersion: vessel.flowcraft.io/v1alpha1
kind: Vessel
metadata:
  name: alpha
spec:
  agents: [a2]
---
apiVersion: vessel.flowcraft.io/v1alpha1
kind: Agent
metadata:
  name: a1
spec:
  engine: {ref: graph-llm, config: {llmProfile: x}}
---
apiVersion: vessel.flowcraft.io/v1alpha1
kind: Agent
metadata:
  name: a2
spec:
  engine: {ref: graph-llm, config: {llmProfile: x}}
