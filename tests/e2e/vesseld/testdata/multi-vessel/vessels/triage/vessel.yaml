apiVersion: vessel.flowcraft.io/v1alpha1
kind: Vessel
metadata:
  name: triage
spec:
  agents:
    - triage-dispatcher
    - triage-worker
  kanban:
    maxPendingTasks: 64
    maxProducerChain: 3
  resources:
    maxConcurrentRuns: 8
    turnTimeout: 30s
  restart:
    mode: on_failure
    maxRestarts: 3
    backoffInit: 1s
    backoffMax: 30s
---
apiVersion: vessel.flowcraft.io/v1alpha1
kind: Agent
metadata:
  name: triage-dispatcher
spec:
  card:
    name: Triage Dispatcher
    description: Routes incoming requests to the right specialist worker.
    skills:
      - triage
      - routing
  historyAccess: read_write
  dispatcher: true
  producerChain: 3
  engine:
    ref: graph-llm
    config:
      llmProfile: shared-openai
      systemPrompt: "You are a triage dispatcher. Use kanban_submit to delegate work."
      maxIterations: 8
---
apiVersion: vessel.flowcraft.io/v1alpha1
kind: Agent
metadata:
  name: triage-worker
spec:
  card:
    name: Triage Worker
    description: Handles routed triage tasks.
  historyAccess: read_only
  engine:
    ref: graph-llm
    config:
      llmProfile: shared-openai
      systemPrompt: "You execute triage tasks delegated by the dispatcher."
