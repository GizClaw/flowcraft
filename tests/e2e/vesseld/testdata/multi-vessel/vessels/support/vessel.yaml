apiVersion: vessel.flowcraft.io/v1alpha1
kind: Vessel
metadata:
  name: support
spec:
  agents:
    - support-agent
  resources:
    maxConcurrentRuns: 4
    turnTimeout: 60s
---
apiVersion: vessel.flowcraft.io/v1alpha1
kind: Agent
metadata:
  name: support-agent
spec:
  card:
    name: Support Agent
    description: Single-agent vessel that answers customer-support questions.
  engine:
    ref: graph-llm
    config:
      llmProfile: shared-openai
      systemPrompt: "You are a friendly customer support agent."
      maxIterations: 6
