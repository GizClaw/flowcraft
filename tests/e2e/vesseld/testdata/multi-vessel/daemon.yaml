apiVersion: vessel.flowcraft.io/v1alpha1
kind: Daemon
metadata:
  name: multi-vessel-fixture
spec:
  control:
    socket: /tmp/vesseld-multi-vessel.sock
  resources:
    maxConcurrentRuns: 32
  llmRateLimits:
    - llmProfile: shared-openai
      requestsPerMinute: 600
      perVesselFairshare: true
  logging:
    format: json
    level: info
  shutdown:
    drainTimeout: 10s
