name: eval / locomo

# ---------------------------------------------------------------------
# LoCoMo-10 dialog-memory benchmark, executed on the self-hosted
# runner labelled `flowcraft-eval`. See internal-docs/eval-runbook.md
# for the host-side setup (runner install, /etc/flowcraft-eval/.env,
# /var/lib/flowcraft-eval/reports).
#
# Canonical CLI: `eval locomo run --dataset <path> --topk N
#                  --extractor --extractor-llm <alias>
#                  --answer-llm <alias> --judge-llm <alias>
#                  --reranker-llm <alias> --embedder <alias>
#                  --concurrency N --ingest-concurrency N
#                  [--multi-recall=true]
#                  [--save-with-context=true]
#                  [--update-resolver=<alias>]
#                  --out <report.json>`
# ---------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Dataset path (.jsonl) or 'synthetic' (smoke)"
        required: true
        # Runner-host path (the flowcraft-eval VM stages datasets under
        # /var/lib/flowcraft-eval/datasets). Override when smoke-testing
        # locally with 'synthetic' or with a repo-relative path.
        default: "/var/lib/flowcraft-eval/datasets/locomo10.jsonl"
      topk:
        description: "Recall top-k"
        required: false
        default: "30"
      # Alias conventions in this repo (see eval/internal/env/provider.go):
      #   <env_suffix>[:<model>] → uses FLOWCRAFT_<ENV_SUFFIX> /
      #                            FLOWCRAFT_TEST_<ENV_SUFFIX> as the
      #                            JSON profile; :model overrides the
      #                            JSON's "model" field. With no :model
      #                            suffix the profile's own model is used.
      #
      # Defaults below mirror the **validated 0.7575 qa.judge baseline**
      # established by run [25896493084] (May 15, 2026, n=1542 on
      # LoCoMo10). A blank dispatch must reproduce that result; future
      # bumps go through a fresh paired-run on the runner. The aliases
      # all resolve to gpt-4o-mini Azure deployments (seeded in
      # /etc/flowcraft-eval/.env as FLOWCRAFT_TEST_AZURE_4O_MINI),
      # mirroring the mem0 / Zep / memobase published methodology so
      # cross-leaderboard comparisons stay apples-to-apples.
      extractor_llm:
        description: "Extractor model alias (validated baseline: azure_4o_mini)"
        required: false
        default: "azure_4o_mini"
      answer_llm:
        description: "Answer-synthesis model alias (validated baseline: azure_4o_mini)"
        required: false
        default: "azure_4o_mini"
      judge_llm:
        description: "Judge model alias (validated baseline: azure_4o_mini, aligned with mem0/Zep/memobase)"
        required: false
        default: "azure_4o_mini"
      reranker_llm:
        description: "Reranker LLM alias ('' to disable) (validated baseline: azure_4o_mini)"
        required: false
        default: "azure_4o_mini"
      embedder:
        description: "Embedder alias (e.g. qwen:text-embedding-v4)"
        required: false
        default: "qwen:text-embedding-v4"
      concurrency:
        description: "QA-loop parallelism (validated baseline: 16)"
        required: false
        default: "16"
      ingest_concurrency:
        description: "Per-conversation extractor parallelism (validated baseline: 16)"
        required: false
        default: "16"
      notify_progress_pct:
        description: "Feishu milestone resolution (% of work; 0=off)"
        required: false
        default: "10"
      limit_questions:
        description: "Debug: cap to first N questions (0 = full set)"
        required: false
        default: "0"
      # ---- Tuning knobs that historically diverged from sdk defaults ----
      soft_merge:
        # CLI / SDK default: true. From May 15, 2026 the SDK skips
        # episodic facts in the vector supersede channel (see
        # sdk/recall/merger.go isEpisodicFact), so leaving this on no
        # longer regresses episodic-heavy datasets like LoCoMo —
        # the previously-required `--soft-merge=false` workaround is
        # gone. Only stable-attribute facts whose extractor did not
        # set Subject+Predicate are eligible for the vector supersede
        # path. The validated 0.7575 baseline runs with true.
        description: "Mark near-duplicate stable-attribute facts as superseded_by (sdk default true)"
        required: false
        type: boolean
        default: true
      multi_recall:
        # CLI default: false (keeps legacy single-lane vector recall + BM25/entity
        # boost behaviour). The validated 0.7575 baseline runs with true,
        # which switches LTM to 3-lane recall (vector + bm25 + entity)
        # + RRFFusion. See sdk/retrieval/pipeline/factory.go
        # WithMultiRecall for the exact stage topology.
        description: "Use 3-lane recall (vector+bm25+entity) + RRFFusion (validated baseline: true)"
        required: false
        type: boolean
        default: true
      update_resolver:
        # Enables mem0 v3-style ADD/UPDATE/DELETE/NOOP memory linker.
        # See sdk/recall/resolver_llm.go LLMUpdateResolver. Each Save
        # batch issues one extra LLM call (resolver decision) plus
        # N×Recall (one per new fact, top-K=20). Cost is non-trivial
        # but offers cleaner long-term memory (no stale facts) for
        # multi-session benches. Empty alias disables.
        description: "LLM alias for the memory update resolver (empty = disabled)"
        required: false
        default: ""
      save_with_context:
        # Before extraction, recall existing facts for the current scope
        # and inject them into the extractor prompt as EXISTING MEMORIES.
        # This is mem0 v3's actual "memory linking" path: a single LLM
        # call sees prior facts and self-dedups / skips semantic
        # duplicates, without a destructive UPDATE/DELETE second call.
        # Far cheaper than --update-resolver and architecturally suited
        # to episodic-heavy datasets (LoCoMo) where old facts must
        # never be tombstoned.
        description: "Inject existing facts into extractor prompt (mem0 v3-style inline dedup)"
        required: false
        type: boolean
        default: false
      qa_timeout:
        # CLI default: 2m. The first smoke run showed a single
        # azure.generate hitting 1m59s — too tight for the current
        # Azure latency profile. Larger envelopes are safer for the
        # full LoCoMo-10 198-question set against Azure.
        description: "Per-question recall+answer+judge deadline (Go duration)"
        required: false
        default: "3m"
      ingest_timeout:
        # CLI default: 10m. Per-conversation cap, before falling back
        # to whatever was extracted so far.
        description: "Per-conversation ingest deadline (Go duration)"
        required: false
        default: "10m"

# Per-kind serialisation: at most one locomo run at a time. Other eval
# kinds (longmemeval / beir / …) have their own concurrency.group and
# run independently.
concurrency:
  group: eval-locomo
  cancel-in-progress: false

env:
  RUN_ID: ${{ github.run_id }}
  REPORT_DIR: /var/lib/flowcraft-eval/reports
  RUN_TAG: locomo-${{ github.run_id }}

jobs:
  run:
    runs-on: [self-hosted, flowcraft-eval]
    # 12h ceiling. LoCoMo-10 with topk=30 + LLM judge fits well within
    # 4h on the current azure:deepseek-flash + azure:gpt-5.4 combo;
    # the headroom guards against accidental --dataset bumps.
    timeout-minutes: 720
    steps:
      - uses: actions/checkout@v4

      - name: Load secrets from runner host
        # All credentials (LLM provider keys + FEISHU_*) live in
        # /etc/flowcraft-eval/.env on this runner, mode 0600. The
        # file is shell-quoted dotenv format: each value is a JSON
        # blob wrapped in single quotes, often spanning multiple
        # physical lines, e.g.
        #     FLOWCRAFT_TEST_AZURE='{
        #       "provider":"azure",
        #       "api_key":"sk-...",
        #     }'
        # A naive `while IFS='=' read` would preserve the quotes AND
        # truncate at the first newline, breaking both JSON parsing
        # and key/value boundaries.
        #
        # Strategy: let bash itself parse the file via `source`
        # (under `set -a` to auto-export every assignment), then
        # transfer only the explicitly-declared keys into
        # $GITHUB_ENV with proper multi-line heredoc syntax.
        # ::add-mask:: is registered per line of every secret value
        # so even a multi-line JSON dump masks correctly in the UI.
        # A copy is also placed at ./.env for the eval binary's own
        # dotenv loader (eval/internal/env/dotenv.go handles quotes
        # + multi-line natively, independent of this path).
        run: |
          set -eu
          test -f /etc/flowcraft-eval/.env
          set -a
          # shellcheck disable=SC1091
          source /etc/flowcraft-eval/.env
          set +a
          while IFS= read -r key; do
            [ -z "$key" ] && continue
            value="${!key:-}"
            [ -z "$value" ] && continue
            while IFS= read -r line; do
              [ -n "$line" ] && echo "::add-mask::$line"
            done <<< "$value"
            if [[ "$value" == *$'\n'* ]]; then
              DELIM="EOF_${RANDOM}${RANDOM}"
              {
                echo "${key}<<${DELIM}"
                echo "$value"
                echo "$DELIM"
              } >> "$GITHUB_ENV"
            else
              echo "${key}=${value}" >> "$GITHUB_ENV"
            fi
          done < <(grep -E '^[A-Z_][A-Z_0-9]*=' /etc/flowcraft-eval/.env | sed 's/=.*$//' | sort -u)
          cp /etc/flowcraft-eval/.env .env
          chmod 600 .env

      - name: Ensure report dir
        run: |
          mkdir -p "$REPORT_DIR"
          # 0750: runner OS user + group readable; world denied.
          chmod 0750 "$REPORT_DIR" || true

      - name: Show eval binary toolchain
        run: |
          go version
          go env GOMODCACHE GOCACHE

      - name: Build eval binary
        # The eval module pins released sdk/sdkx via go.mod and uses
        # GOWORK=off in CI; mirror that here so we use the pinned
        # versions, not the workspace overlay.
        run: |
          cd eval
          GOWORK=off go build -trimpath -o /tmp/eval ./cmd/eval
          /tmp/eval --help | head -20

      - name: Notify Feishu — started
        if: success()
        # Plain text message at start. The live CardKit progress
        # updates emitted by the running eval binary use FEISHU_APP_*
        # credentials (also loaded above) and are independent of this
        # webhook ping.
        run: |
          set -eu
          if [ -z "${FEISHU_WEBHOOK_URL:-}" ]; then
            echo "FEISHU_WEBHOOK_URL not set in /etc/flowcraft-eval/.env; skipping started ping"
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "$FEISHU_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d @- <<EOF
          {
            "msg_type": "text",
            "content": {
              "text": "▶ locomo run started\nrun_id=${{ github.run_id }}\ndataset=${{ inputs.dataset }}\ntopk=${{ inputs.topk }} extractor=${{ inputs.extractor_llm }} judge=${{ inputs.judge_llm }}\nlogs: $RUN_URL"
            }
          }
          EOF

      - name: Run locomo
        env:
          REPORT_OUT: ${{ env.REPORT_DIR }}/${{ github.run_id }}.json
        # CardKit live-update flags:
        #   --notify-name      identifies this run in the card header
        #   --notify-progress-pct  milestone resolution
        # We default reranker/embedder/limit-questions to optional so a
        # smoke run (`--dataset synthetic --limit-questions 50`) reuses
        # the same workflow.
        run: |
          set -eu
          # --soft-merge takes its boolean via `=true|=false` so the
          # workflow's `type: boolean` input maps cleanly. The other
          # timeouts are Go duration strings (e.g. "3m", "30s").
          ARGS=(
            locomo run
            --dataset "${{ inputs.dataset }}"
            --topk "${{ inputs.topk }}"
            --extractor
            --extractor-llm "${{ inputs.extractor_llm }}"
            --answer-llm "${{ inputs.answer_llm }}"
            --judge-llm "${{ inputs.judge_llm }}"
            --concurrency "${{ inputs.concurrency }}"
            --ingest-concurrency "${{ inputs.ingest_concurrency }}"
            --soft-merge=${{ inputs.soft_merge }}
            --multi-recall=${{ inputs.multi_recall }}
            --save-with-context=${{ inputs.save_with_context }}
            --qa-timeout "${{ inputs.qa_timeout }}"
            --ingest-timeout "${{ inputs.ingest_timeout }}"
            --notify-name "$RUN_TAG"
            --notify-progress-pct "${{ inputs.notify_progress_pct }}"
            --out "$REPORT_OUT"
          )
          if [ -n "${{ inputs.reranker_llm }}" ]; then
            ARGS+=( --reranker-llm "${{ inputs.reranker_llm }}" )
          fi
          if [ -n "${{ inputs.embedder }}" ]; then
            ARGS+=( --embedder "${{ inputs.embedder }}" )
          fi
          if [ -n "${{ inputs.update_resolver }}" ]; then
            ARGS+=( --update-resolver "${{ inputs.update_resolver }}" )
          fi
          if [ "${{ inputs.limit_questions }}" != "0" ]; then
            ARGS+=( --limit-questions "${{ inputs.limit_questions }}" )
          fi
          /tmp/eval "${ARGS[@]}"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locomo-report-${{ github.run_id }}
          path: ${{ env.REPORT_DIR }}/${{ github.run_id }}.json
          if-no-files-found: warn
          retention-days: 90

      - name: Notify Feishu — final
        if: always()
        # Final summary. We pull headline numbers via jq from the
        # locomo Report shape (aggregate.qa.em / qa.f1 / qa.judge / n).
        # Token-usage isn't in the Report today; once `internal-docs/
        # eval-platform-design-actions.md` §4.5 lands the cached/input
        # rollup, extend the METRICS line to include them.
        run: |
          set +e
          REPORT="$REPORT_DIR/${{ github.run_id }}.json"
          STATUS="${{ job.status }}"
          ICON="✅"
          [ "$STATUS" != "success" ] && ICON="❌"
          # latency.*.p95 is raw nanoseconds (Go time.Duration marshals
          # to int64); convert to ms here so the Feishu summary stays
          # human-readable. tostring is forced on every numeric field so
          # the final concat never sees mixed string+number arithmetic.
          if [ -s "$REPORT" ]; then
            METRICS=$(jq -r '
              def ns2ms(x): if x == null then "n/a" else ((x/1000000)|tostring) + "ms" end;
              "n=" + (.n|tostring)
              + " qa.judge=" + (.aggregate."qa.judge"|tostring)
              + " qa.f1=" + (.aggregate."qa.f1"|tostring)
              + " qa.em=" + (.aggregate."qa.em"|tostring)
              + (if .aggregate."recall.k_hit" != null
                   then " recall.k_hit=" + (.aggregate."recall.k_hit"|tostring)
                   else "" end)
              + " save.p95=" + ns2ms(.latency.save.p95)
              + " recall.p95=" + ns2ms(.latency.recall.p95)
            ' "$REPORT" 2>/dev/null)
          else
            METRICS="report not produced"
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -n "${FEISHU_WEBHOOK_URL:-}" ]; then
            curl -sS -X POST "$FEISHU_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d @- <<EOF
          {
            "msg_type": "text",
            "content": {
              "text": "$ICON locomo run finished\nstatus=$STATUS\n$METRICS\nlogs: $RUN_URL"
            }
          }
          EOF
          else
            echo "FEISHU_WEBHOOK_URL not set; skipping final ping"
          fi
