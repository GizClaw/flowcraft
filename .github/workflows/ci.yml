name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      sdk: ${{ steps.filter.outputs.sdk }}
      sdkx: ${{ steps.filter.outputs.sdkx }}
      plugin: ${{ steps.filter.outputs.plugin }}
      platform: ${{ steps.filter.outputs.platform }}
      web: ${{ steps.filter.outputs.web }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sdk:
              - 'sdk/**'
            sdkx:
              - 'sdkx/**'
            plugin:
              - 'plugin/**'
            platform:
              - 'cmd/**'
              - 'internal/**'
              - 'go.mod'
              - 'go.sum'
            web:
              - 'web/**'
            ci:
              - '.github/workflows/**'
              - 'Makefile'

  lint:
    name: Lint
    needs: detect
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.sdkx == 'true' || needs.detect.outputs.plugin == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: go vet
        run: |
          for m in sdk sdkx plugin; do
            echo "==> vet $m"
            (cd "$m" && go vet ./...)
          done
      - name: gofmt check
        run: |
          diff=$(gofmt -l sdk sdkx plugin)
          if [ -n "$diff" ]; then
            echo "Files not formatted:"
            echo "$diff"
            exit 1
          fi

  lint-platform:
    name: Lint Platform
    needs: detect
    if: needs.detect.outputs.platform == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: go vet
        run: go vet ./...
      - name: gofmt check
        run: |
          diff=$(gofmt -l cmd/ internal/)
          if [ -n "$diff" ]; then
            echo "Files not formatted:"
            echo "$diff"
            exit 1
          fi

  test-sdk:
    name: Test sdk (Go ${{ matrix.go-version }})
    needs: detect
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -count=1 -race ./...
        working-directory: sdk

  test-sdkx:
    name: Test sdkx (Go ${{ matrix.go-version }})
    needs: detect
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.sdkx == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -count=1 -race ./...
        working-directory: sdkx

  test-plugin:
    name: Test plugin (Go ${{ matrix.go-version }})
    needs: detect
    if: needs.detect.outputs.plugin == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -count=1 -race ./...
        working-directory: plugin

  test-platform:
    name: Test Platform
    needs: detect
    if: needs.detect.outputs.platform == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Test
        run: go test -count=1 -race ./internal/...

  build-matrix:
    name: Build ${{ matrix.target }}
    needs: detect
    if: needs.detect.outputs.platform == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
            tags: linux
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
            tags: ""
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
            tags: ""
          - target: windows-amd64
            goos: windows
            goarch: amd64
            tags: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          TAGS="${{ matrix.tags }}"
          if [ -n "$TAGS" ]; then
            go build -tags "$TAGS" -ldflags="-s -w" -o "dist/flowcraft-${{ matrix.target }}" ./cmd/flowcraft
          else
            go build -ldflags="-s -w" -o "dist/flowcraft-${{ matrix.target }}" ./cmd/flowcraft
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: flowcraft-${{ matrix.target }}
          path: dist/flowcraft-${{ matrix.target }}

  lint-web:
    name: Lint & Build Web
    needs: detect
    if: needs.detect.outputs.web == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx vitest run
      - run: npm run build

  ci-pass:
    name: CI
    if: always()
    needs: [lint, lint-platform, test-sdk, test-sdkx, test-plugin, test-platform, build-matrix, lint-web]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results=( \
            "${{ needs.lint.result }}" \
            "${{ needs.lint-platform.result }}" \
            "${{ needs.test-sdk.result }}" \
            "${{ needs.test-sdkx.result }}" \
            "${{ needs.test-plugin.result }}" \
            "${{ needs.test-platform.result }}" \
            "${{ needs.build-matrix.result }}" \
            "${{ needs.lint-web.result }}" \
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "Job failed or cancelled: $r"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped."
