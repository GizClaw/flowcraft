name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      sdk: ${{ steps.filter.outputs.sdk }}
      sdkx: ${{ steps.filter.outputs.sdkx }}
      voice: ${{ steps.filter.outputs.voice }}
      vessel: ${{ steps.filter.outputs.vessel }}
      vesseld: ${{ steps.filter.outputs.vesseld }}
      vessel_quality: ${{ steps.filter.outputs.vessel_quality }}
      vesseld_e2e: ${{ steps.filter.outputs.vesseld_e2e }}
      retrieval_e2e: ${{ steps.filter.outputs.retrieval_e2e }}
      eval: ${{ steps.filter.outputs.eval }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sdk:
              - 'sdk/**'
            sdkx:
              - 'sdkx/**'
            voice:
              - 'voice/**'
            vessel:
              - 'vessel/**'
            vesseld:
              - 'cmd/vesseld/**'
            vessel_quality:
              - 'tests/quality/vessel/**'
            vesseld_e2e:
              - 'tests/e2e/vesseld/**'
            retrieval_e2e:
              - 'tests/e2e/retrieval/**'
            eval:
              - 'eval/**'
            ci:
              - '.github/workflows/**'
              - 'Makefile'

  lint:
    name: Lint
    needs: detect
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.sdkx == 'true' || needs.detect.outputs.voice == 'true' || needs.detect.outputs.vessel == 'true' || needs.detect.outputs.vesseld == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: go vet
        run: |
          for m in sdk sdkx voice vessel cmd/vesseld; do
            echo "==> vet $m"
            (cd "$m" && go vet ./...)
          done
          # Modules that pin released sdk/sdkx/vessel via require
          # directives — vet them with GOWORK=off so the pinned
          # versions are honoured. The e2e suites are also build-
          # tagged (//go:build e2e) so we pass -tags=e2e.
          for m in eval tests/quality/vessel; do
            echo "==> vet $m (GOWORK=off)"
            (cd "$m" && GOWORK=off go vet ./...)
          done
          for m in tests/e2e/vesseld tests/e2e/retrieval; do
            echo "==> vet $m (e2e tag, GOWORK=off)"
            (cd "$m" && GOWORK=off go vet -tags=e2e ./...)
          done
      - name: gofmt check
        run: |
          diff=$(gofmt -l sdk sdkx voice vessel cmd/vesseld eval tests/quality/vessel tests/e2e/vesseld tests/e2e/retrieval)
          if [ -n "$diff" ]; then
            echo "Files not formatted:"
            echo "$diff"
            exit 1
          fi

  test-sdk:
    name: Test sdk (Go ${{ matrix.go-version }})
    needs: detect
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -count=1 -race ./...
        working-directory: sdk

  test-sdkx:
    name: Test sdkx (Go ${{ matrix.go-version }})
    needs: detect
    # sdkx depends on sdk, so run when either changes
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.sdkx == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -count=1 -race ./...
        working-directory: sdkx

  test-voice:
    name: Test voice (Go ${{ matrix.go-version }})
    needs: detect
    # voice depends on sdk, so run when either changes
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.voice == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -count=1 -race ./...
        working-directory: voice

  test-vessel:
    name: Test vessel (Go ${{ matrix.go-version }})
    needs: detect
    # vessel depends on sdk; rerun when either changes.
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.vessel == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -count=1 -race ./...
        working-directory: vessel

  test-vesseld:
    name: Test vesseld (Go ${{ matrix.go-version }})
    needs: detect
    # vesseld depends on sdk + sdkx + vessel; rerun when any changes.
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.sdkx == 'true' || needs.detect.outputs.vessel == 'true' || needs.detect.outputs.vesseld == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -count=1 -race ./...
        working-directory: cmd/vesseld

  test-vessel-quality:
    name: Test vessel quality (Go ${{ matrix.go-version }})
    needs: detect
    # In-process quality suite for the vessel runtime; reruns on
    # sdk/vessel changes plus when the suite itself moves.
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.vessel == 'true' || needs.detect.outputs.vessel_quality == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: GOWORK=off go test -count=1 -race ./...
        working-directory: tests/quality/vessel

  test-vesseld-e2e:
    name: E2E vesseld (Go ${{ matrix.go-version }})
    needs: detect
    # Black-box subprocess suite for the vesseld binary; reruns
    # when the daemon, vessel, sdk, or the suite itself moves.
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.sdkx == 'true' || needs.detect.outputs.vessel == 'true' || needs.detect.outputs.vesseld == 'true' || needs.detect.outputs.vesseld_e2e == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    env:
      # The e2e module pins released sdk/sdkx versions and uses
      # `replace` directives to swap in the in-tree source. It must
      # NOT participate in the workspace, otherwise go.work would
      # take precedence and the replace lines become dead code.
      GOWORK: "off"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -tags=e2e -count=1 -race ./...
        working-directory: tests/e2e/vesseld

  test-retrieval-e2e:
    name: E2E retrieval (Go ${{ matrix.go-version }})
    needs: detect
    # On-disk LocalWorkspace conformance suite for sdkx/retrieval/workspace.
    # Reruns when sdk/sdkx changes or the suite itself moves.
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.sdkx == 'true' || needs.detect.outputs.retrieval_e2e == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    env:
      # Pinned to released sdk/sdkx tags via go.mod; keep go.work
      # out of the resolution path so the pin is honoured.
      GOWORK: "off"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -tags=e2e -count=1 -race -timeout 120s ./...
        working-directory: tests/e2e/retrieval

  test-eval:
    name: Test eval (Go ${{ matrix.go-version }})
    needs: detect
    # eval pins released sdk/sdkx via go.mod and runs with GOWORK=off, so
    # rerun whenever sdk/sdkx changes (the pin may need a bump) or the
    # suites themselves move.
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.sdkx == 'true' || needs.detect.outputs.eval == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    env:
      GOWORK: "off"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -count=1 -race ./...
        working-directory: eval

  # Gate job: single required status check for branch protection.
  # Always runs; succeeds only when all triggered jobs pass.
  ci-pass:
    name: CI
    if: always()
    needs: [lint, test-sdk, test-sdkx, test-voice, test-vessel, test-vesseld, test-vessel-quality, test-vesseld-e2e, test-retrieval-e2e, test-eval]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results=( \
            "${{ needs.lint.result }}" \
            "${{ needs.test-sdk.result }}" \
            "${{ needs.test-sdkx.result }}" \
            "${{ needs.test-voice.result }}" \
            "${{ needs.test-vessel.result }}" \
            "${{ needs.test-vesseld.result }}" \
            "${{ needs.test-vessel-quality.result }}" \
            "${{ needs.test-vesseld-e2e.result }}" \
            "${{ needs.test-retrieval-e2e.result }}" \
            "${{ needs.test-eval.result }}" \
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "Job failed or cancelled: $r"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped."
