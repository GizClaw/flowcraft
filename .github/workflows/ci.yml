name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      sdk: ${{ steps.filter.outputs.sdk }}
      memory: ${{ steps.filter.outputs.memory }}
      sdkx: ${{ steps.filter.outputs.sdkx }}
      voice: ${{ steps.filter.outputs.voice }}
      eval: ${{ steps.filter.outputs.eval }}
      examples: ${{ steps.filter.outputs.examples }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sdk:
              - 'sdk/**'
            memory:
              - 'memory/**'
            sdkx:
              - 'sdkx/**'
            voice:
              - 'voice/**'
            eval:
              - 'eval/**'
            examples:
              - 'examples/voice-pipeline/**'
            ci:
              - '.github/workflows/**'
              - 'Makefile'
              - 'go.work'

  lint:
    name: Lint
    needs: detect
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.memory == 'true' || needs.detect.outputs.sdkx == 'true' || needs.detect.outputs.voice == 'true' || needs.detect.outputs.eval == 'true' || needs.detect.outputs.examples == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: go vet
        run: |
          set -euo pipefail
          for m in sdk memory sdkx voice eval; do
            echo "==> vet $m"
            (cd "$m" && go vet ./...)
          done
          for m in examples/voice-pipeline; do
            echo "==> vet $m (GOWORK=off)"
            (cd "$m" && GOWORK=off go vet ./...)
          done
      - name: gofmt check
        run: |
          diff=$(gofmt -l sdk memory sdkx voice eval examples/voice-pipeline)
          if [ -n "$diff" ]; then
            echo "Files not formatted:"
            echo "$diff"
            exit 1
          fi

  test-sdk:
    name: Test sdk (Go ${{ matrix.go-version }})
    needs: detect
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.memory == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -count=1 -race ./...
        working-directory: sdk

  test-memory:
    name: Test memory (Go ${{ matrix.go-version }})
    needs: detect
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.memory == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -count=1 -race ./...
        working-directory: memory

  test-sdkx:
    name: Test sdkx (Go ${{ matrix.go-version }})
    needs: detect
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.memory == 'true' || needs.detect.outputs.sdkx == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -count=1 -race ./...
        working-directory: sdkx

  test-sdkx-nsjail-integration:
    name: Integration sdkx/sandbox/nsjail
    needs: detect
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.sdkx == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Install nsjail
        run: |
          set -euo pipefail
          if command -v nsjail >/dev/null 2>&1; then
            echo "nsjail already present: $(command -v nsjail)"
            nsjail --help 2>&1 | head -3 || true
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libcap-dev libprotobuf-dev protobuf-compiler \
            libnl-3-dev libnl-route-3-dev \
            bison flex
          git clone --depth 1 https://github.com/google/nsjail.git /tmp/nsjail
          make -C /tmp/nsjail -j"$(nproc)"
          sudo install -m 0755 /tmp/nsjail/nsjail /usr/local/bin/nsjail
          nsjail --help 2>&1 | head -3 || true
      - name: Test
        run: go test -tags=integration_nsjail -count=1 -timeout 180s ./sandbox/nsjail/...
        working-directory: sdkx

  test-voice:
    name: Test voice (Go ${{ matrix.go-version }})
    needs: detect
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.voice == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -count=1 -race ./...
        working-directory: voice

  test-eval:
    name: Test eval (Go ${{ matrix.go-version }})
    needs: detect
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.memory == 'true' || needs.detect.outputs.sdkx == 'true' || needs.detect.outputs.eval == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -count=1 -race ./...
        working-directory: eval

  test-examples:
    name: Test examples (Go ${{ matrix.go-version }})
    needs: detect
    if: needs.detect.outputs.sdk == 'true' || needs.detect.outputs.sdkx == 'true' || needs.detect.outputs.voice == 'true' || needs.detect.outputs.examples == 'true' || needs.detect.outputs.ci == 'true'
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go test -count=1 ./...
        working-directory: examples/voice-pipeline

  ci-pass:
    name: CI
    if: always()
    needs:
      - lint
      - test-sdk
      - test-memory
      - test-sdkx
      - test-sdkx-nsjail-integration
      - test-voice
      - test-eval
      - test-examples
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results=( \
            "${{ needs.lint.result }}" \
            "${{ needs.test-sdk.result }}" \
            "${{ needs.test-memory.result }}" \
            "${{ needs.test-sdkx.result }}" \
            "${{ needs.test-sdkx-nsjail-integration.result }}" \
            "${{ needs.test-voice.result }}" \
            "${{ needs.test-eval.result }}" \
            "${{ needs.test-examples.result }}" \
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "Job failed or cancelled: $r"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped."
