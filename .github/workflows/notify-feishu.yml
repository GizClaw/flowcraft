name: notify / feishu

# Centralised completion notifier for all eval workflows.
#
# Architectural intent
# --------------------
# Pre-fix, every eval workflow had its own "Notify Feishu — final" step
# bolted onto the same self-hosted runner that ran the actual eval.
# When the runner died (network drop, OOM-killer, force-cancel), the
# notify step never ran — even with `if: always()`, because `always()`
# is a STEP-level guarantee inside the SAME job and same machine. If
# the runner agent itself is gone there is no "always" anywhere.
#
# This workflow decouples notification delivery from the runner that
# hosts the eval:
#
#   1. It triggers on `workflow_run.completed` — GitHub fires this
#      whether the upstream workflow ended with success, failure,
#      cancelled, or timed_out (including when the self-hosted
#      runner went away mid-step). The event is generated by the
#      GitHub control plane, not by the runner that died.
#   2. It runs on `ubuntu-latest` — a GH-hosted runner whose health
#      is completely independent of any self-hosted infrastructure.
#   3. Per-workflow metric extraction lives here so all eval
#      workflows stay focused on what they DO, not on how to
#      report what they did. The metric jq expressions for each
#      eval are gathered into one `case` block; adding a new eval
#      means appending one case branch, not duplicating ~40 lines
#      of notify shell into another workflow file.
#
# The upstream eval workflows are intentionally kept silent on Feishu
# (no "started" or "final" curl steps). The in-process CardKit
# notifier (`eval/internal/notify/feishu_app.go`) continues to provide
# live progress patches WHILE the run is alive — when the run dies
# mid-flight the CardKit card simply freezes at its last-known state
# and this workflow posts a fresh text message tagged with the final
# conclusion. The two surfaces are complementary: the card shows
# "where it got to", this message shows "how it ended".

on:
  workflow_run:
    workflows:
      - "eval / simpleqa"
    types: [completed]

permissions:
  # download-artifact@v4 needs actions:read to pull the upstream
  # workflow run's artifact (the per-eval report.json). All other
  # permissions are read-only by default for workflow_run triggers,
  # which is what we want — this workflow only reads run state and
  # posts to an external webhook.
  actions: read
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    # The notify worker is bounded by network IO (download artifact +
    # post webhook) and one jq invocation; 5 minutes is generous.
    timeout-minutes: 5
    steps:
      - name: Resolve eval shortname
        id: meta
        # Workflow names are "eval / <shortname>"; the artifact uploaded
        # by every eval is named "<shortname>-report-<run_id>". We
        # derive shortname once here so the rest of the steps stay
        # workflow-agnostic.
        env:
          WF_NAME: ${{ github.event.workflow_run.name }}
        run: |
          set -euo pipefail
          short="${WF_NAME##*/ }"
          short="$(echo "$short" | tr -d '[:space:]')"
          echo "shortname=$short" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${short}-report-${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"

      - name: Download report artifact
        id: dl
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ./report
          # Artifacts come from a DIFFERENT workflow run; without
          # run-id download-artifact@v4 only looks in the CURRENT
          # run (which produced nothing).
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        # Best-effort: if the eval crashed before writing a report
        # (or the upload-artifact step never ran because the runner
        # died), we still want to post the conclusion + a link.
        # Skipping with continue-on-error makes the next step's
        # "report not produced" branch fire instead of failing the
        # notify job outright.
        continue-on-error: true

      - name: Compose + post Feishu message
        env:
          STATUS:     ${{ github.event.workflow_run.conclusion }}
          WF_NAME:    ${{ github.event.workflow_run.name }}
          SHORT:      ${{ steps.meta.outputs.shortname }}
          RUN_URL:    ${{ github.event.workflow_run.html_url }}
          RUN_ID:     ${{ github.event.workflow_run.id }}
          BRANCH:     ${{ github.event.workflow_run.head_branch }}
          EVENT:      ${{ github.event.workflow_run.event }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          set +e
          if [ -z "${FEISHU_WEBHOOK_URL:-}" ]; then
            echo "FEISHU_WEBHOOK_URL not set; skipping notify"
            exit 0
          fi

          ICON="✅"
          [ "$STATUS" != "success" ] && ICON="❌"

          # Locate the report. The eval workflows upload exactly one
          # file (<run_id>.json) into the artifact, but we glob to
          # stay tolerant of future schema changes (e.g. a sibling
          # summary.txt).
          REPORT=$(find ./report -type f -name '*.json' 2>/dev/null | head -n1)

          METRICS="report not produced"
          if [ -n "$REPORT" ] && [ -s "$REPORT" ]; then
            # Per-eval metric shapes — these are the same jq
            # expressions that lived inside each eval workflow's
            # "Notify Feishu — final" step pre-centralisation, moved
            # here verbatim. Adding a new eval = adding one case
            # branch + listing the workflow name above; no need to
            # touch the eval workflow itself.
            case "$SHORT" in
              simpleqa)
                METRICS=$(jq -r '
                  "n=\(.n) correct=\(.correct) incorrect=\(.incorrect) not_attempted=\(.not_attempted) judge_failures=\(.judge_failures)\n" +
                  "accuracy=\(.accuracy) attempted_accuracy=\(.attempted_accuracy)\n" +
                  "abstention=\(.abstention_rate) hallucination=\(.hallucination_rate)"
                ' "$REPORT" 2>/dev/null) || METRICS="metrics parse failed"
                ;;
              *)
                METRICS="no metric extractor registered for $SHORT"
                ;;
            esac
            # jq can succeed but emit empty — surface that explicitly
            # rather than letting it look like the run produced
            # nothing.
            [ -z "$METRICS" ] && METRICS="(metrics empty)"
          fi

          # Single text message — no CardKit interactivity needed
          # here: this is the "did it finish?" line. The eval's
          # in-process CardKit card carries the rich progress UX
          # while the run is alive. printf joins newlines so the
          # whole heredoc stays indented inside the `run: |` block
          # (a bare multi-line string with column-0 lines would
          # break the YAML scanner).
          BODY=$(printf '%s\n%s\n%s\nlogs: %s' \
            "$ICON $WF_NAME finished" \
            "status=$STATUS  branch=$BRANCH  event=$EVENT" \
            "$METRICS" \
            "$RUN_URL")

          # jq -Rs '.' escapes BODY safely as a JSON string so a
          # surprise quote/backslash in METRICS cannot break the
          # payload. printf preserves embedded newlines through the
          # pipe, which `echo` mangles on some shells.
          PAYLOAD=$(printf '%s' "$BODY" | jq -Rs '{msg_type:"text", content:{text:.}}')

          curl -sS -X POST "$FEISHU_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"
