name: eval / longmemeval

# ---------------------------------------------------------------------
# LongMemEval (ICLR 2025) executed via `eval locomo run` against a
# LongMemEval-converted JSONL dataset. The locomo runner is shape-
# compatible with the converted LME data (see eval/longmemeval/cli.go).
#
# Datasets must be converted once on the runner host:
#   eval longmemeval convert --in <upstream.json> --out <out.jsonl>
# Conventional path:
#   eval/longmemeval/data/longmemeval_oracle.jsonl
#   eval/longmemeval/data/longmemeval_s.jsonl
#   eval/longmemeval/data/longmemeval_m.jsonl
# ---------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Converted LongMemEval .jsonl path"
        required: true
        default: "eval/longmemeval/data/longmemeval_oracle.jsonl"
      topk:
        description: "Recall top-k"
        required: false
        default: "30"
      # See eval-locomo.yml for the alias convention. Defaults below
      # mirror the historical lme-launch.sh values (azure_ds_flash /
      # azure_gpt54 / qwen:qwen-flash) that have been validated against
      # the Azure deployments seeded in the runner host's .env.
      extractor_llm:
        description: "Extractor model alias"
        required: false
        default: "azure_ds_flash"
      answer_llm:
        description: "Answer-synthesis model alias (minimax for cost; azure_ds_flash for speed)"
        required: false
        default: "minimax"
      judge_llm:
        description: "Judge model alias"
        required: false
        default: "azure_gpt54"
      reranker_llm:
        description: "Reranker LLM alias ('' to disable)"
        required: false
        default: "qwen:qwen-flash"
      embedder:
        description: "Embedder alias"
        required: false
        default: "qwen:text-embedding-v4"
      concurrency:
        description: "QA-loop parallelism"
        required: false
        default: "8"
      ingest_concurrency:
        description: "Per-conversation extractor parallelism"
        required: false
        default: "8"
      notify_progress_pct:
        description: "Feishu milestone resolution (% of work)"
        required: false
        default: "5"
      limit_questions:
        description: "Debug: cap to first N questions (0 = full set)"
        required: false
        default: "0"
      # ---- Tuning knobs (mirrors eval-locomo.yml so the same
      # architectural ablation can be dispatched on both benchmarks
      # without per-workflow drift). LLM aliases and concurrency are
      # intentionally NOT mirrored — those are dataset-shape tuned:
      # LongMemEval's _s split has 500-session haystacks and 100k+
      # token contexts, which calls for stronger judges (azure_gpt54)
      # and lower concurrency (Azure rate limits).
      soft_merge:
        # Legacy lme-launch.sh ran with --soft-merge=false; sdk default
        # is true. Behaviour delta: near-duplicate fact merging (older
        # entries marked superseded_by + damped at recall) vs distinct.
        description: "Mark near-duplicate facts as superseded_by (sdk default true)"
        required: false
        type: boolean
        default: true
      multi_recall:
        # CLI default: false (keeps legacy single-lane vector recall + BM25/entity
        # boost behaviour). The LoCoMo validated baseline runs with true,
        # which switches LTM to 3-lane recall (vector + bm25 + entity)
        # + RRFFusion. See sdk/retrieval/pipeline/factory.go
        # WithMultiRecall for the exact stage topology.
        description: "Use 3-lane recall (vector+bm25+entity) + RRFFusion (LoCoMo validated baseline: true)"
        required: false
        type: boolean
        default: true
      update_resolver:
        # Enables mem0 v3-style ADD/UPDATE/DELETE/NOOP memory linker.
        # See sdk/recall/resolver_llm.go LLMUpdateResolver. Each Save
        # batch issues one extra LLM call (resolver decision) plus
        # N×Recall (one per new fact, top-K=20). Cost is non-trivial
        # but offers cleaner long-term memory (no stale facts) for
        # multi-session benches. Empty alias disables.
        description: "LLM alias for the memory update resolver (empty = disabled)"
        required: false
        default: ""
      recent_turns:
        # Cross-batch reference-resolution context window. When >0,
        # the extractor receives the previous K messages from prior
        # Save batches on the same scope as RECENT TURNS — used to
        # resolve pronouns, anaphora, short references, and
        # chronology hints that were established earlier but absent
        # from the current batch. The buffer lives in-process; see
        # sdk/recall/message_buffer.go for the persistent-backend
        # contract. Cost is one extra prompt section per Save (no
        # extra LLM call). 0 disables.
        description: "Inject previous K messages from prior batches into extractor (0 = disabled)"
        required: false
        default: "0"
      save_with_context:
        # Before extraction, recall existing facts for the current scope
        # and inject them into the extractor prompt as EXISTING MEMORIES.
        # This is mem0 v3's actual "memory linking" path: a single LLM
        # call sees prior facts and self-dedups / skips semantic
        # duplicates, without a destructive UPDATE/DELETE second call.
        # Far cheaper than --update-resolver and architecturally suited
        # to episodic-heavy datasets where old facts must never be
        # tombstoned. LongMemEval _s has long episodic histories so
        # this is expected to behave similarly to LoCoMo.
        description: "Inject existing facts into extractor prompt (mem0 v3-style inline dedup)"
        required: false
        type: boolean
        default: false
      entity_store:
        # Enables the entity-link inverted index lane (4th lane in
        # MultiRetrieve, fed by EntityStore.Lookup on the entities the
        # query extractor surfaces). Auto-enables --multi-recall. Adds
        # a sibling namespace per Scope (ltm_<rt>__u_<user>__entities)
        # with one row per normalised entity name; row writes happen
        # synchronously after every Save batch.
        description: "Enable entity-link inverted-index lane (architectural ablation)"
        required: false
        type: boolean
        default: false
      entity_store_max_linked:
        # Common-noun pollution gate. SDK semantics post-#179.4:
        # 0 = SDK safe default (defaultEntityMaxLinkedCount = 100,
        # the value that gives back ~9pp on LoCoMo run 25980251192
        # where the gate was OFF); >0 = exact threshold honoured
        # verbatim; <0 = explicit audited opt-out (gate off, with a
        # one-time warning emitted at Memory.New). No-op when
        # entity_store=false.
        description: "Skip entity rows with > N linked entries at Lookup (0 = SDK safe default 100; <0 = audited opt-out)"
        required: false
        default: "0"
      entity_link_boost:
        # Post-fusion entity-link integration mode. When > 0, the
        # ModeEntityLink lane is REMOVED from MultiRetrieve and instead
        # an EntityLinkBoost stage multiplies the score of every fused
        # hit whose Doc.ID appears in CandidateEntityIDs by (1 + boost).
        # Vector + BM25 keep ownership of candidate generation so
        # multi-hop questions don't starve, and entity-link only acts
        # as a re-ranking nudge. 0 keeps legacy 4-lane RRF integration.
        # No-op when entity_store=false.
        description: "Switch entity-link integration from RRF lane to post-fusion boost (0 = lane, 0.2-0.5 = boost)"
        required: false
        default: "0"
      query_entity_extractor:
        # Closes the entity-vocabulary asymmetry: write-side uses the
        # LLM-based AdditiveExtractor (multi-word noun phrases like
        # "LGBTQ support group"), query-side defaults to a rule-based
        # capitalized-token splitter ("lgbtq" only). When true, we
        # reuse the --extractor-llm to extract query entities with the
        # same vocabulary as the EntityStore keys. Adds 1 LLM call per
        # recall (cheap; same model + JSON mode). No-op when
        # entity_store=false.
        description: "Use LLM-backed query-side entity extractor (reuses --extractor-llm)"
        required: false
        type: boolean
        default: false
      qa_timeout:
        # Default 3m (vs CLI default 2m) because Azure azure.generate
        # observed at ~2m in the loomo smoke; LME questions have longer
        # contexts so a wider envelope reduces spurious timeouts.
        description: "Per-question recall+answer+judge deadline (Go duration)"
        required: false
        default: "3m"
      ingest_timeout:
        # LME-s has up to 500-session haystacks per instance; extraction
        # at concurrency=48 can cluster, so the 10m CLI default holds
        # but tunable here for stress runs.
        description: "Per-conversation ingest deadline (Go duration)"
        required: false
        default: "10m"
      lme_ref:
        # HuggingFace revision of xiaowu0162/longmemeval-cleaned to
        # fetch. 'main' resolves to the latest cleaned-dataset commit;
        # pin to a specific SHA before publishing a leaderboard row so
        # the dataset bytes are immutable (HF allows edits on main).
        description: "HF revision of xiaowu0162/longmemeval-cleaned (commit SHA or 'main')"
        required: false
        default: "main"

# LongMemEval-s 500 instances at concurrency=8 still saturates one
# Azure endpoint; serialise per kind.
concurrency:
  group: eval-longmemeval
  cancel-in-progress: false

env:
  REPORT_DIR: /var/lib/flowcraft-eval/reports
  RUN_TAG: lme-${{ github.run_id }}

jobs:
  run:
    runs-on: [self-hosted, flowcraft-eval]
    timeout-minutes: 720
    steps:
      - uses: actions/checkout@v4

      - name: Load secrets from runner host
        # See eval-locomo.yml for the rationale. The .env on the
        # runner host uses shell-quoted multi-line JSON values which
        # require bash's own parser; a naive `while IFS='=' read`
        # corrupts them.
        run: |
          set -eu
          test -f /etc/flowcraft-eval/.env
          set -a
          # shellcheck disable=SC1091
          source /etc/flowcraft-eval/.env
          set +a
          while IFS= read -r key; do
            [ -z "$key" ] && continue
            value="${!key:-}"
            [ -z "$value" ] && continue
            while IFS= read -r line; do
              [ -n "$line" ] && echo "::add-mask::$line"
            done <<< "$value"
            if [[ "$value" == *$'\n'* ]]; then
              DELIM="EOF_${RANDOM}${RANDOM}"
              {
                echo "${key}<<${DELIM}"
                echo "$value"
                echo "$DELIM"
              } >> "$GITHUB_ENV"
            else
              echo "${key}=${value}" >> "$GITHUB_ENV"
            fi
          done < <(grep -E '^[A-Z_][A-Z_0-9]*=' /etc/flowcraft-eval/.env | sed 's/=.*$//' | sort -u)
          cp /etc/flowcraft-eval/.env .env
          chmod 600 .env

      - name: Ensure report dir
        run: |
          mkdir -p "$REPORT_DIR"
          chmod 0750 "$REPORT_DIR" || true

      - name: Build eval binary
        # `eval` is a workspace member (see ../go.work) — build with
        # the workspace overlay so sdk/sdkx resolve to monorepo HEAD
        # rather than the v0.3.x require pins.
        run: |
          cd eval
          go build -trimpath -o /tmp/eval ./cmd/eval

      - name: Refresh dataset from upstream
        # LongMemEval datasets are published on HuggingFace under
        # xiaowu0162/longmemeval-cleaned (the 2025/09 cleaned variant,
        # which removes noisy history sessions interfering with answer
        # correctness — paper: https://arxiv.org/abs/2410.10813). We
        # mirror the eval-locomo.yml bootstrap strategy:
        #
        #   1. Cache the raw upstream JSON under
        #      /var/lib/flowcraft-eval/datasets/cache/, keyed by HF ref.
        #      Same ref => zero network (cache is never auto-pruned).
        #      Pin `lme_ref` to a commit SHA before a leaderboard row.
        #   2. Always re-convert from cache so the on-disk JSONL is a
        #      pure function of (cache, converter version). Avoids the
        #      pre-cleaning bug class where an old manually-staged JSONL
        #      silently invalidates all subsequent runs.
        #   3. Only auto-fetch when `dataset` matches a canonical
        #      eval/longmemeval/data/*.jsonl path; arbitrary paths
        #      (smoke runs, ad-hoc overrides) are left untouched.
        #
        # Why HF and not jsDelivr like LoCoMo? jsDelivr only mirrors
        # GitHub repos, not HF datasets, and the upstream LMEdata only
        # lives on HF. HF's CDN works in CN with measurable but
        # acceptable latency for one-time downloads (~30s-2min for
        # _s_cleaned at ~80MB).
        env:
          DATASET_IN: ${{ inputs.dataset }}
          LME_REF: ${{ inputs.lme_ref }}
        run: |
          set -eu
          DS="$DATASET_IN"
          case "$DS" in
            eval/longmemeval/data/longmemeval_oracle.jsonl)
              UPSTREAM_FILE="longmemeval_oracle.json"
              ;;
            eval/longmemeval/data/longmemeval_s.jsonl|eval/longmemeval/data/longmemeval_s_cleaned.jsonl)
              UPSTREAM_FILE="longmemeval_s_cleaned.json"
              ;;
            eval/longmemeval/data/longmemeval_m.jsonl|eval/longmemeval/data/longmemeval_m_cleaned.jsonl)
              UPSTREAM_FILE="longmemeval_m_cleaned.json"
              ;;
            *)
              echo "skipping refresh: '$DS' not a canonical LME path"
              exit 0
              ;;
          esac
          mkdir -p "$(dirname "$DS")"
          CACHE_DIR=/var/lib/flowcraft-eval/datasets/cache
          mkdir -p "$CACHE_DIR"
          CACHE="$CACHE_DIR/${UPSTREAM_FILE%.json}-${LME_REF}.json"
          RAW="/tmp/lme-raw/$UPSTREAM_FILE"
          mkdir -p "$(dirname "$RAW")"
          if [ -s "$CACHE" ]; then
            echo "cache hit ($CACHE, $(wc -c < "$CACHE") bytes)"
          else
            URL="https://huggingface.co/datasets/xiaowu0162/longmemeval-cleaned/resolve/${LME_REF}/${UPSTREAM_FILE}"
            TMP="${CACHE}.partial"
            echo "downloading ref=$LME_REF → $CACHE"
            curl -sSLf --max-time 600 -o "$TMP" "$URL"
            mv "$TMP" "$CACHE"
            echo "downloaded $(wc -c < "$CACHE") bytes"
          fi
          cp "$CACHE" "$RAW"
          /tmp/eval longmemeval convert --in "$RAW" --out "$DS"
          echo "fresh dataset: $(wc -l < "$DS") lines, $(wc -c < "$DS") bytes"

      - name: Verify dataset exists
        # Final guard against typos in `dataset` input that the refresh
        # step's case-match silently skipped (e.g. wrong filename).
        run: |
          set -eu
          DS="${{ inputs.dataset }}"
          if [ ! -s "$DS" ]; then
            echo "::error::LongMemEval dataset $DS missing or empty after refresh."
            echo "If this is a custom path, stage it manually with:"
            echo "  /tmp/eval longmemeval convert --in <upstream.json> --out $DS"
            exit 1
          fi
          echo "dataset $DS: $(wc -l < "$DS") lines"

      - name: Notify Feishu — started
        if: success()
        run: |
          set -eu
          if [ -z "${FEISHU_WEBHOOK_URL:-}" ]; then
            echo "FEISHU_WEBHOOK_URL not set; skipping started ping"
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "$FEISHU_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d @- <<EOF
          {
            "msg_type": "text",
            "content": {
              "text": "▶ longmemeval run started\nrun_id=${{ github.run_id }}\ndataset=${{ inputs.dataset }}\ntopk=${{ inputs.topk }} extractor=${{ inputs.extractor_llm }} judge=${{ inputs.judge_llm }}\nlogs: $RUN_URL"
            }
          }
          EOF

      - name: Run longmemeval (via locomo runner)
        env:
          REPORT_OUT: ${{ env.REPORT_DIR }}/${{ github.run_id }}.json
        run: |
          set -eu
          # Argument plumbing mirrors eval-locomo.yml so dispatching
          # the same architectural ablation (e.g. entity_store +
          # save_with_context + query_entity_extractor) on both
          # benchmarks is mechanical. The optional flags below
          # (reranker, embedder, update_resolver, limit_questions,
          # recent_turns) are only appended when set so unspecified
          # inputs do not surface as empty-string CLI flags the
          # parser would mistake for explicit zero values.
          ARGS=(
            locomo run
            --dataset "${{ inputs.dataset }}"
            --topk "${{ inputs.topk }}"
            --extractor
            --extractor-llm "${{ inputs.extractor_llm }}"
            --answer-llm "${{ inputs.answer_llm }}"
            --judge-llm "${{ inputs.judge_llm }}"
            --concurrency "${{ inputs.concurrency }}"
            --ingest-concurrency "${{ inputs.ingest_concurrency }}"
            --soft-merge=${{ inputs.soft_merge }}
            --multi-recall=${{ inputs.multi_recall }}
            --save-with-context=${{ inputs.save_with_context }}
            --entity-store=${{ inputs.entity_store }}
            --entity-store-max-linked=${{ inputs.entity_store_max_linked }}
            --entity-link-boost=${{ inputs.entity_link_boost }}
            --query-entity-extractor=${{ inputs.query_entity_extractor }}
            --qa-timeout "${{ inputs.qa_timeout }}"
            --ingest-timeout "${{ inputs.ingest_timeout }}"
            --notify-name "$RUN_TAG"
            --notify-progress-pct "${{ inputs.notify_progress_pct }}"
            --out "$REPORT_OUT"
          )
          if [ -n "${{ inputs.reranker_llm }}" ]; then
            ARGS+=( --reranker-llm "${{ inputs.reranker_llm }}" )
          fi
          if [ -n "${{ inputs.embedder }}" ]; then
            ARGS+=( --embedder "${{ inputs.embedder }}" )
          fi
          if [ -n "${{ inputs.update_resolver }}" ]; then
            ARGS+=( --update-resolver "${{ inputs.update_resolver }}" )
          fi
          if [ "${{ inputs.limit_questions }}" != "0" ]; then
            ARGS+=( --limit-questions "${{ inputs.limit_questions }}" )
          fi
          if [ "${{ inputs.recent_turns }}" != "0" ]; then
            ARGS+=( --recent-turns "${{ inputs.recent_turns }}" )
          fi
          /tmp/eval "${ARGS[@]}"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: longmemeval-report-${{ github.run_id }}
          path: ${{ env.REPORT_DIR }}/${{ github.run_id }}.json
          if-no-files-found: warn
          retention-days: 90

      - name: Notify Feishu — final
        if: always()
        run: |
          set +e
          REPORT="$REPORT_DIR/${{ github.run_id }}.json"
          STATUS="${{ job.status }}"
          ICON="✅"
          [ "$STATUS" != "success" ] && ICON="❌"
          # latency.*.p95 is raw nanoseconds (Go time.Duration marshals
          # to int64); convert to ms for the Feishu summary.
          if [ -s "$REPORT" ]; then
            METRICS=$(jq -r '
              def ns2ms(x): if x == null then "n/a" else ((x/1000000)|tostring) + "ms" end;
              "n=" + (.n|tostring)
              + " qa.judge=" + (.aggregate."qa.judge"|tostring)
              + " qa.f1=" + (.aggregate."qa.f1"|tostring)
              + " qa.em=" + (.aggregate."qa.em"|tostring)
              + (if .aggregate."recall.k_hit" != null
                   then " recall.k_hit=" + (.aggregate."recall.k_hit"|tostring)
                   else "" end)
              + " save.p95=" + ns2ms(.latency.save.p95)
              + " recall.p95=" + ns2ms(.latency.recall.p95)
            ' "$REPORT" 2>/dev/null)
          else
            METRICS="report not produced"
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -n "${FEISHU_WEBHOOK_URL:-}" ]; then
            curl -sS -X POST "$FEISHU_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d @- <<EOF
          {
            "msg_type": "text",
            "content": {
              "text": "$ICON longmemeval run finished\nstatus=$STATUS\n$METRICS\nlogs: $RUN_URL"
            }
          }
          EOF
          else
            echo "FEISHU_WEBHOOK_URL not set; skipping final ping"
          fi
