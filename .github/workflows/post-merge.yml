name: Post-merge

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Build
        run: |
          for m in sdk sdkx; do
            echo "==> build $m"
            (cd "$m" && go build ./...)
          done
      - name: Vet
        run: |
          for m in sdk sdkx; do
            echo "==> vet $m"
            (cd "$m" && go vet ./...)
          done
