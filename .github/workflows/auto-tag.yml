name: Auto-tag modules

on:
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - "sdkx/**"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-tag
  cancel-in-progress: false

jobs:
  # Hard opt-out: if the head commit message contains `[skip-tag]`, the
  # whole workflow skips. Use this when a release coordinator is hand-
  # tagging (e.g. a SemVer-major / breaking-change bump that auto-tag's
  # patch-only logic would label incorrectly). Mirrors GitHub's own
  # `[skip ci]` convention.
  #
  # Per-module skip is below: `[skip-tag:sdk]` keeps the workflow
  # running but bypasses the sdk module specifically.
  guard:
    name: Check skip-tag marker
    runs-on: ubuntu-latest
    outputs:
      skip_all: ${{ steps.check.outputs.skip_all }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - id: check
        run: |
          msg=$(git log -1 --pretty=%B)
          if echo "$msg" | grep -qiE '\[skip[-_]tag\]'; then
            echo "head commit opts out of auto-tag, exiting cleanly"
            echo "skip_all=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_all=false" >> "$GITHUB_OUTPUT"
          fi

  tag:
    name: Tag changed modules
    needs: guard
    if: needs.guard.outputs.skip_all != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Capture per-module skip markers
        id: skip
        run: |
          msg=$(git log -1 --pretty=%B)
          # Extract each `[skip-tag:<mod>]` marker from the commit message
          # and surface them as MODULE_SKIP_<MOD>=1 env vars consumed by
          # tag_module. Case-insensitive on the keyword, exact match on
          # the module token.
          for mod in sdk sdkx; do
            if echo "$msg" | grep -qiE "\[skip[-_]tag:${mod}\]"; then
              key="MODULE_SKIP_$(echo "$mod" | tr '[:lower:]' '[:upper:]')"
              echo "${key}=1" >> "$GITHUB_ENV"
              echo "$mod: per-module skip marker present"
            fi
          done

      - name: Detect changes and tag
        run: |
          set -euo pipefail

          bump_patch() {
            local tag=$1
            local version=${tag##*/v}
            local major minor patch
            IFS='.' read -r major minor patch <<< "$version"
            echo "${major}.${minor}.$((patch + 1))"
          }

          latest_tag() {
            git tag -l "$1/v*" --sort=-v:refname | head -1
          }

          has_changes() {
            local mod=$1 latest=$2
            [ -n "$(git diff --name-only "$latest"..HEAD -- "$mod/")" ]
          }

          # tag_module tags a module if it has changes since its last tag.
          # On success, writes the new version to $TAGGED_<MOD> env var.
          # Honours the per-module skip marker captured by the previous
          # step (MODULE_SKIP_<MOD>=1 from `[skip-tag:<mod>]`).
          tag_module() {
            local mod=$1
            local skip_var="MODULE_SKIP_$(echo "$mod" | tr '[:lower:]' '[:upper:]')"
            if [ "${!skip_var:-}" = "1" ]; then
              echo "$mod: skipped via [skip-tag:${mod}]"
              return
            fi
            local latest
            latest=$(latest_tag "$mod")
            if [ -z "$latest" ]; then
              echo "::warning::No existing tag for $mod, skipping"
              return
            fi
            if ! has_changes "$mod" "$latest"; then
              echo "$mod: no changes since $latest"
              return
            fi
            local new_version
            new_version=$(bump_patch "$latest")
            local new_tag="${mod}/v${new_version}"
            echo "$mod: $latest -> $new_tag"
            git tag "$new_tag"
            git push origin "$new_tag"

            local env_key
            env_key="TAGGED_$(echo "$mod" | tr '[:lower:]' '[:upper:]')"
            echo "${env_key}=${new_version}" >> "$GITHUB_ENV"
          }

          # Phase 1: tag leaf modules (sdk)
          tag_module "sdk"

      - name: Cascade sdk bump to sdkx
        if: env.TAGGED_SDK != ''
        run: |
          set -euo pipefail

          branch="chore/bump-sdkx-sdk-v${TAGGED_SDK}"
          echo "sdkx: updating sdk dependency to v${TAGGED_SDK}"

          git checkout -b "$branch"
          cd sdkx
          go get "github.com/GizClaw/flowcraft/sdk@v${TAGGED_SDK}"
          go mod tidy
          cd ..
          git add sdkx/go.mod sdkx/go.sum
          git commit -m "chore(sdkx): bump sdk dependency to v${TAGGED_SDK}"
          git push origin "$branch"

          gh pr create \
            --title "chore(sdkx): bump sdk dependency to v${TAGGED_SDK}" \
            --body "Auto-generated by auto-tag workflow. Bumps \`sdkx/go.mod\` to sdk v${TAGGED_SDK}. Once merged, auto-tag will detect the change and tag sdkx." \
            --head "$branch" \
            --base main
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Tag sdkx (if changed independently)
        if: env.TAGGED_SDK == '' && env.MODULE_SKIP_SDKX != '1'
        run: |
          set -euo pipefail

          latest=$(git tag -l "sdkx/v*" --sort=-v:refname | head -1)
          if [ -z "$latest" ]; then
            echo "::warning::No existing tag for sdkx, skipping"
            exit 0
          fi
          if [ -z "$(git diff --name-only "$latest"..HEAD -- sdkx/)" ]; then
            echo "sdkx: no changes since $latest"
            exit 0
          fi

          version=${latest##*/v}
          IFS='.' read -r major minor patch <<< "$version"
          new_tag="sdkx/v${major}.${minor}.$((patch + 1))"
          echo "sdkx: $latest -> $new_tag"
          git tag "$new_tag"
          git push origin "$new_tag"
