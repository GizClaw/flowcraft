name: Auto-tag modules

on:
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - "sdkx/**"
      - "memory/**"
      - "voice/**"

permissions:
  contents: write

concurrency:
  group: auto-tag
  cancel-in-progress: false

jobs:
  guard:
    name: Check skip-tag marker
    runs-on: ubuntu-latest
    outputs:
      skip_all: ${{ steps.check.outputs.skip_all }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - id: check
        run: |
          msg=$(git log -1 --pretty=%B)
          if echo "$msg" | grep -qiE '\[skip[-_]tag\]'; then
            echo "head commit opts out of auto-tag, exiting cleanly"
            echo "skip_all=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_all=false" >> "$GITHUB_OUTPUT"
          fi

  tag:
    name: Tag changed modules
    needs: guard
    if: needs.guard.outputs.skip_all != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Capture per-module skip markers
        run: |
          msg=$(git log -1 --pretty=%B)
          for mod in sdk sdkx memory voice; do
            if echo "$msg" | grep -qiE "\[skip[-_]tag:${mod}\]"; then
              key="MODULE_SKIP_$(echo "$mod" | tr '[:lower:]' '[:upper:]')"
              echo "${key}=1" >> "$GITHUB_ENV"
              echo "$mod: per-module skip marker present"
            fi
          done

      - name: Detect modules touched by THIS push
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          zeros="0000000000000000000000000000000000000000"
          if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "${zeros}" ]; then
            echo "no usable BEFORE_SHA, treating every module as touched"
            for mod in sdk sdkx memory voice; do
              key="MODULE_TOUCHED_$(echo "$mod" | tr '[:lower:]' '[:upper:]')"
              echo "${key}=1" >> "$GITHUB_ENV"
            done
            exit 0
          fi
          git fetch --no-tags origin "${BEFORE_SHA}" >/dev/null 2>&1 || true
          for mod in sdk sdkx memory voice; do
            if [ -n "$(git diff --name-only "${BEFORE_SHA}".."${AFTER_SHA}" -- "$mod/")" ]; then
              key="MODULE_TOUCHED_$(echo "$mod" | tr '[:lower:]' '[:upper:]')"
              echo "${key}=1" >> "$GITHUB_ENV"
              echo "$mod: touched by this push"
            else
              echo "$mod: not touched by this push"
            fi
          done

      - name: Detect changes and tag
        run: |
          set -euo pipefail

          bump_patch() {
            local tag=$1
            local version=${tag##*/v}
            local major minor patch
            IFS='.' read -r major minor patch <<< "$version"
            echo "${major}.${minor}.$((patch + 1))"
          }

          latest_tag() {
            git tag -l "$1/v*" --sort=-v:refname | head -1
          }

          has_changes() {
            local mod=$1 latest=$2
            [ -n "$(git diff --name-only "$latest"..HEAD -- "$mod/")" ]
          }

          tag_module() {
            local mod=$1
            local skip_var="MODULE_SKIP_$(echo "$mod" | tr '[:lower:]' '[:upper:]')"
            if [ "${!skip_var:-}" = "1" ]; then
              echo "$mod: skipped via [skip-tag:${mod}]"
              return
            fi
            local touched_var="MODULE_TOUCHED_$(echo "$mod" | tr '[:lower:]' '[:upper:]')"
            if [ "${!touched_var:-}" != "1" ]; then
              echo "$mod: not touched by this push, skipping"
              return
            fi
            local latest
            latest=$(latest_tag "$mod")
            if [ -z "$latest" ]; then
              echo "::warning::No existing tag for $mod, skipping"
              return
            fi
            if ! has_changes "$mod" "$latest"; then
              echo "$mod: no changes since $latest"
              return
            fi
            local new_version
            new_version=$(bump_patch "$latest")
            local new_tag="${mod}/v${new_version}"
            echo "$mod: $latest -> $new_tag"
            git tag "$new_tag"
            git push origin "$new_tag"
          }

          tag_module "sdk"
          tag_module "sdkx"
          tag_module "memory"
          tag_module "voice"
